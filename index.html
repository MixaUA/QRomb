<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Кільцевий шифр — кодер/декодер (тест)</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0b3d63;
    color: #fff;
    font-family: 'Georgia', serif;
    margin: 0;
    padding: 20px 12px 60px;
  }
  h1 { font-size: 20px; font-weight: normal; text-align: center; margin: 0 0 4px; }
  .sub { text-align: center; color: #aacbe8; font-size: 13px; margin-bottom: 24px; }

  .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
  .tab {
    background: #0e4a78; border: 1px solid #ffffff33; color: #aacbe8;
    padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .tab.active { background: #ffd479; color: #0b3d63; font-weight: bold; }

  .panel { display: none; max-width: 520px; margin: 0 auto; }
  .panel.active { display: block; }

  .card { background: #0e4a78; border: 2px solid #ffffff33; border-radius: 8px; padding: 18px; }
  canvas { width: 100%; height: auto; display: block; background: #0b3d63; border-radius: 6px; }

  label { display: block; font-size: 13px; color: #aacbe8; margin: 14px 0 6px; }
  input[type=text] {
    width: 100%; padding: 10px; font-size: 16px; border-radius: 6px;
    border: 1px solid #ffffff33; background: #0b3d63; color: #fff; font-family: monospace;
  }
  .status { font-size: 13px; margin-top: 8px; min-height: 18px; }
  .status.ok { color: #7fd67f; }
  .status.warn { color: #ffb84d; }
  .status.err { color: #ff6b6b; }

  button {
    background: #ffd479; color: #0b3d63; border: none; border-radius: 6px;
    padding: 10px 16px; font-size: 14px; font-weight: bold; cursor: pointer; margin: 6px 6px 0 0;
  }
  button:active { transform: scale(0.98); }
  button.secondary { background: #1a5b8f; color: #fff; }

  .decode-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 6px;
    background: #000;
  }
  #camVideo {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  /* розмиває відео камери скрізь, окрім трикутника-гейда (дірка вирізається через clip-path) */
  .blur-mask {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }
  #decCanvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: transparent;
    pointer-events: none;
  }

  .result {
    margin-top: 14px; font-size: 22px; letter-spacing: 2px;
    font-family: monospace; word-break: break-all; min-height: 32px;
  }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 4px;
    font-size: 12px; margin-left: 8px; vertical-align: middle;
  }
  .badge.ok { background: #1e5c1e; color: #a4e8a4; }
  .badge.err { background: #5c1e1e; color: #e8a4a4; }
</style>
</head>
<body>

<h1>Кільцевий шифр Полібія</h1>
<div class="sub">10 кілець · дзеркальна перевірка · до 10 символів у одному статичному диску</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('enc')">Кодер</div>
  <div class="tab" onclick="switchTab('dec')">Декодер (камера)</div>
</div>

<div class="panel active" id="panel-enc">
  <div class="card">
    <canvas id="encCanvas" width="480" height="480"></canvas>
    <label>Текст (до 10 символів, укр. літери / пробіл / крапка)</label>
    <input type="text" id="textInput" maxlength="10" value="ТЕО КІТ" oninput="onTextInput()">
    <div class="status" id="encStatus"></div>
    <button onclick="downloadPNG()">Завантажити PNG</button>
  </div>
</div>

<div class="panel" id="panel-dec">
  <div class="card">
    <div class="decode-wrap">
      <video id="camVideo" autoplay playsinline muted></video>
      <div class="blur-mask" id="blurMask"></div>
      <canvas id="decCanvas" width="340" height="340"></canvas>
    </div>
    <div class="status" id="decStatus">Радар вимкнено</div>
    <div class="result" id="decResult"></div>
    <button onclick="startCam()">Запустити камеру</button>
    <button class="secondary" onclick="stopCam()">Зупинити</button>
  </div>
</div>

<script>
/* ===================== АЛФАВІТ ПОЛІБІЯ ===================== */
// 33 укр. літери + пробіл + крапка = 35 символів. Індекс 35 (row5,col5) = службовий маркер "кінець".
const ALPHABET = "АБВГҐДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ .".split('');
const END_INDEX = 35;
const charToIndex = {};
ALPHABET.forEach((c, i) => charToIndex[c] = i);
function indexToChar(i) { return ALPHABET[i] ?? '?'; }

/* ===================== ГЕОМЕТРІЯ ДИСКА (кодер) ===================== */
const CX = 240, CY = 240;
const ANCHOR_R = 200;
const ANCHOR_SIZE = 14;
const START_ANGLE = Math.PI / 2;
const RINGS = 10, SECTORS = 12;
const INNER_R = 40, OUTER_R = 175;
const RING_GAP = (OUTER_R - INNER_R) / RINGS;
const HUB_R = 16;

/* ===================== КОДУВАННЯ ТЕКСТУ В БІТИ ===================== */
function encodeTextToRings(text) {
  const chars = text.split('').filter(c => charToIndex[c] !== undefined).slice(0, RINGS);
  const indices = [];
  for (let i = 0; i < RINGS; i++) {
    indices.push(i < chars.length ? charToIndex[chars[i]] : END_INDEX);
  }
  return indices; // 10 індексів (0-35), кожен = один символ на одному кільці
}

function indicesToRingBits(indices) {
  // Повертає масив [RINGS][SECTORS] бітів (0/1), з дзеркалом
  const fullBits = [];
  for (let ring = 0; ring < RINGS; ring++) {
    const idx = indices[ring];
    const row = Math.floor(idx / 6), col = idx % 6;
    const bits6 = [
      (row >> 2) & 1, (row >> 1) & 1, row & 1,
      (col >> 2) & 1, (col >> 1) & 1, col & 1
    ];
    const ringBits = new Array(SECTORS);
    for (let k = 0; k < 6; k++) {
      ringBits[k] = bits6[k];
      ringBits[11 - k] = bits6[k]; // дзеркало
    }
    fullBits.push(ringBits);
  }
  return fullBits;
}

/* ===================== МАЛЮВАННЯ (кодер) ===================== */
function drawAnchors(ctx) {
  ctx.fillStyle = '#ffffff';
  const angles = [90, 210, 330].map(d => d * Math.PI / 180);
  for (const a of angles) {
    ctx.beginPath();
    ctx.arc(CX + Math.cos(a) * ANCHOR_R, CY + Math.sin(a) * ANCHOR_R, ANCHOR_SIZE, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHub(ctx) {
  ctx.beginPath();
  ctx.arc(CX, CY, HUB_R, 0, Math.PI * 2);
  ctx.fill();
}

function drawDisc(canvas, fullBits) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 480, 480);
  ctx.fillStyle = '#0b3d63';
  ctx.fillRect(0, 0, 480, 480);

  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  for (let ring = 0; ring < RINGS; ring++) {
    const rInner = INNER_R + ring * RING_GAP;
    const rOuter = INNER_R + (ring + 1) * RING_GAP;
    for (let sector = 0; sector < SECTORS; sector++) {
      if (fullBits[ring][sector] !== 1) continue;
      const a0 = START_ANGLE + (sector / SECTORS) * Math.PI * 2;
      const a1 = START_ANGLE + ((sector + 1) / SECTORS) * Math.PI * 2;
      ctx.moveTo(CX + Math.cos(a0) * rOuter, CY + Math.sin(a0) * rOuter);
      ctx.arc(CX, CY, rOuter, a0, a1);
      ctx.arc(CX, CY, rInner, a1, a0, true);
      ctx.closePath();
    }
  }
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  drawHub(ctx);
  drawAnchors(ctx);
}

/* ===================== КОДЕР UI ===================== */
function onTextInput() {
  const raw = document.getElementById('textInput').value.toUpperCase();
  document.getElementById('textInput').value = raw;

  const status = document.getElementById('encStatus');
  const bad = raw.split('').filter(c => charToIndex[c] === undefined);
  if (bad.length) {
    status.className = 'status warn';
    status.textContent = `Непідтримані символи буде пропущено: ${[...new Set(bad)].join(' ')}`;
  } else if (raw.length > 10) {
    status.className = 'status warn';
    status.textContent = 'Влізе лише перші 10 символів';
  } else {
    status.className = 'status ok';
    status.textContent = `${Math.min(raw.length,10)} / 10 символів`;
  }

  const indices = encodeTextToRings(raw);
  const bits = indicesToRingBits(indices);
  drawDisc(document.getElementById('encCanvas'), bits);
}

function downloadPNG() {
  const a = document.createElement('a');
  a.download = 'ring-cipher.png';
  a.href = document.getElementById('encCanvas').toDataURL('image/png');
  a.click();
}

/* ===================== ДЕКОДЕР (камера) ===================== */

const ANALYSIS_SIZE = 340;

const analysisCanvas = document.createElement('canvas');
analysisCanvas.width = ANALYSIS_SIZE;
analysisCanvas.height = ANALYSIS_SIZE;
const analysisCtx = analysisCanvas.getContext('2d', { willReadFrequently: true });

/* ================================================================
   ФІКСОВАНИЙ ШАБЛОН-ГЕЙД: замість пошуку трикутника по всьому кадру
   (що плутало клітинки диска з якорями) — трикутник завжди в
   одному й тому ж місці екрана. Людина сама підганяє диск під нього.
   Кути шаблону відповідають кутам якорів у кодері (90°/210°/330°),
   тож орієнтація й масштаб зчитування кілець стають константами.
   ================================================================ */
const TEMPLATE_CX = ANALYSIS_SIZE / 2;
const TEMPLATE_CY = ANALYSIS_SIZE / 2;
const TEMPLATE_SIDE = 200;
const TEMPLATE_R = TEMPLATE_SIDE / Math.sqrt(3);
const TEMPLATE_ROTATION = Math.PI / 2; // низ трикутника дивиться вниз, як у кодері
const TEMPLATE_ANGLES = [90, 210, 330].map(d => d * Math.PI / 180);
const TEMPLATE_VERTICES = TEMPLATE_ANGLES.map(a => ({
  x: TEMPLATE_CX + Math.cos(a) * TEMPLATE_R,
  y: TEMPLATE_CY + Math.sin(a) * TEMPLATE_R
}));
// масштаб переводу кодерських радіусів (простір 480px, ANCHOR_R=200) у простір аналізу (340px)
const TEMPLATE_SCALE = TEMPLATE_R / ANCHOR_R;

const VERTEX_SAMPLE_RADIUS = 9;   // px у просторі аналізу — область навколо кожної вершини шаблону
const VERTEX_SAMPLE_STEP = 3;
const VERTEX_MARK_FRACTION = 0.5; // яка частка точок у зоні має бути "яскравою", щоб рахувати якір знайденим

const DISC_POLARITY = 'light'; // біла руна на темному тлі

const CONFIRM_STREAK = 3;
const LOCK_HOLD_MS = 550;
const NOISE_MISMATCH_THRESHOLD = 15;

let scanHistory = [];
let locking = false;
let camStream = null, scanTimer = null;

/* стан підсвітки шаблону: чорний під час пошуку, зелений коли всі 3 кути збігаються */
let templateActive = false;
let colorProgress = 0; // згладжений перехід 0(чорний) -> 1(зелений)
const COLOR_EASE = 0.2;
const COLOR_SEARCH = [40, 40, 40];
const COLOR_FOUND = [90, 220, 110];
let overlayAnimFrame = null;

function drawFocusTriangle(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);
  const t = colorProgress;
  const r = Math.round(COLOR_SEARCH[0] + t * (COLOR_FOUND[0] - COLOR_SEARCH[0]));
  const g = Math.round(COLOR_SEARCH[1] + t * (COLOR_FOUND[1] - COLOR_SEARCH[1]));
  const b = Math.round(COLOR_SEARCH[2] + t * (COLOR_FOUND[2] - COLOR_SEARCH[2]));
  ctx.strokeStyle = `rgb(${r},${g},${b})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  TEMPLATE_VERTICES.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
  ctx.closePath();
  ctx.stroke();
}

function animateOverlay() {
  const dc = document.getElementById('decCanvas');
  const ctx = dc.getContext('2d');

  const target = templateActive ? 1 : 0;
  colorProgress += (target - colorProgress) * COLOR_EASE;
  if (Math.abs(target - colorProgress) < 0.01) colorProgress = target;

  drawFocusTriangle(ctx, dc.width, dc.height);
  overlayAnimFrame = requestAnimationFrame(animateOverlay);
}

/* підганяє "дірку" розмиття під фактичний розмір decode-wrap на екрані
   (координати шаблону задані в просторі ANALYSIS_SIZE, тут перераховуємо в CSS-пікселі) */
function updateBlurMaskClip() {
  const mask = document.getElementById('blurMask');
  const wrap = mask.parentElement;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  if (!w || !h) return;
  const sx = w / ANALYSIS_SIZE, sy = h / ANALYSIS_SIZE;
  const pts = TEMPLATE_VERTICES.map(v => `${(v.x * sx).toFixed(1)},${(v.y * sy).toFixed(1)}`);
  const d = `M0,0 H${w} V${h} H0 Z M${pts[0]} L${pts[1]} L${pts[2]} Z`;
  const clip = `path(evenodd, '${d}')`;
  mask.style.clipPath = clip;
  mask.style.webkitClipPath = clip;
}
window.addEventListener('resize', updateBlurMaskClip);

async function startCam() {
  try {
    const video = document.getElementById('camVideo');
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 640 } }
    });
    video.srcObject = camStream;
    scanHistory = [];
    templateActive = false;
    colorProgress = 0;
    locking = false;
    setStatus('Сумісти диск із трикутником...', '');
    document.getElementById('decResult').innerHTML = '';
    updateBlurMaskClip();
    scanTimer = setInterval(scanFrame, 220);
    if (overlayAnimFrame) cancelAnimationFrame(overlayAnimFrame);
    overlayAnimFrame = requestAnimationFrame(animateOverlay);
  } catch (e) {
    setStatus('Помилка камери: ' + e.message, 'err');
  }
}

function stopCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  if (overlayAnimFrame) { cancelAnimationFrame(overlayAnimFrame); overlayAnimFrame = null; }
  scanHistory = [];
  templateActive = false;
  colorProgress = 0;
  locking = false;
  setStatus('Радар вимкнено', '');
  const dc = document.getElementById('decCanvas');
  dc.getContext('2d').clearRect(0, 0, dc.width, dc.height);
}

function setStatus(text, cls) {
  const st = document.getElementById('decStatus');
  st.textContent = text;
  st.className = 'status' + (cls ? ' ' + cls : '');
}

function scanFrame() {
  const video = document.getElementById('camVideo');
  if (!camStream || video.readyState < 2) return;

  const vw = video.videoWidth, vh = video.videoHeight;
  if (vw && vh) {
    const sSize = Math.min(vw, vh);
    const sx = (vw - sSize) / 2, sy = (vh - sSize) / 2;
    analysisCtx.drawImage(video, sx, sy, sSize, sSize, 0, 0, ANALYSIS_SIZE, ANALYSIS_SIZE);
  } else {
    analysisCtx.drawImage(video, 0, 0, ANALYSIS_SIZE, ANALYSIS_SIZE);
  }

  tryDecode();
}

function tryDecode() {
  if (locking) return; // триває пауза-утримання перед фіксацією — кадри ігноруємо

  const W = ANALYSIS_SIZE, H = ANALYSIS_SIZE;
  const img = analysisCtx.getImageData(0, 0, W, H);
  const data = img.data;

  function lum(x, y) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return 255;
    const i = (y * W + x) * 4;
    return data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
  }

  let totalLum = 0;
  for (let i = 0; i < data.length; i += 32) totalLum += data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
  const avgLum = totalLum / (data.length / 32);
  const THRESH = DISC_POLARITY === 'light'
    ? Math.max(140, avgLum * 1.24)
    : Math.min(115, avgLum * 0.76);
  function isMark(l) { return DISC_POLARITY === 'light' ? l > THRESH : l < THRESH; }

  // --- КРОК 1: чи всі 3 кути фіксованого шаблону накриті яскравими якорями ---
  let hits = 0;
  for (const v of TEMPLATE_VERTICES) {
    let markCount = 0, sampleCount = 0;
    for (let dy = -VERTEX_SAMPLE_RADIUS; dy <= VERTEX_SAMPLE_RADIUS; dy += VERTEX_SAMPLE_STEP) {
      for (let dx = -VERTEX_SAMPLE_RADIUS; dx <= VERTEX_SAMPLE_RADIUS; dx += VERTEX_SAMPLE_STEP) {
        if (dx * dx + dy * dy > VERTEX_SAMPLE_RADIUS * VERTEX_SAMPLE_RADIUS) continue;
        sampleCount++;
        if (isMark(lum(v.x + dx, v.y + dy))) markCount++;
      }
    }
    if (sampleCount > 0 && markCount / sampleCount >= VERTEX_MARK_FRACTION) hits++;
  }

  if (hits < 3) {
    templateActive = false;
    scanHistory = [];
    setStatus(`Суміщення... (${hits}/3 якорів)`, '');
    return;
  }
  templateActive = true;

  // --- КРОК 2: зчитування 10 кілець (6 унікальних + 6 дзеркальних), геометрія фіксована ---
  const dc = document.getElementById('decCanvas');
  const overlayCtx = dc.getContext('2d'); // точки семплів малюємо тим самим ctx, що й анімація оверлею
  const indices = [];
  let totalMismatches = 0;

  for (let ring = 0; ring < RINGS; ring++) {
    const ringMidR = (INNER_R + (ring + 0.5) * RING_GAP) * TEMPLATE_SCALE;

    function sampleSector(sector) {
      const midAngle = TEMPLATE_ROTATION + ((sector + 0.5) / SECTORS) * Math.PI * 2;
      const px = TEMPLATE_CX + Math.cos(midAngle) * ringMidR;
      const py = TEMPLATE_CY + Math.sin(midAngle) * ringMidR;
      const bit = isMark(lum(px, py)) ? 1 : 0;
      overlayCtx.fillStyle = bit ? 'rgba(255,80,80,0.85)' : 'rgba(120,255,140,0.7)';
      overlayCtx.beginPath(); overlayCtx.arc(px, py, 2.5, 0, Math.PI * 2); overlayCtx.fill();
      return bit;
    }

    const leftBits = [0,1,2,3,4,5].map(sampleSector);
    const rightBitsRaw = [11,10,9,8,7,6].map(sampleSector);
    for (let k = 0; k < 6; k++) if (leftBits[k] !== rightBitsRaw[k]) totalMismatches++;

    const row = (leftBits[0] << 2) | (leftBits[1] << 1) | leftBits[2];
    const col = (leftBits[3] << 2) | (leftBits[4] << 1) | leftBits[5];
    indices.push(row * 6 + col);
  }

  let text = '';
  for (const idx of indices) {
    if (idx === END_INDEX) break;
    text += indexToChar(idx);
  }

  registerReading(text, totalMismatches);
}

/* накопичення підтверджень + lock-hold пауза перед фіксацією */
function registerReading(text, mismatches) {
  if (locking) return;

  if (mismatches > NOISE_MISMATCH_THRESHOLD) {
    scanHistory = [];
    setStatus('Сирий шум, тримай рівніше...', '');
    return;
  }

  const reading = text + '|' + mismatches;
  if (scanHistory.length && scanHistory[scanHistory.length - 1] === reading) {
    scanHistory.push(reading);
  } else {
    scanHistory = [reading];
  }

  const resultEl = document.getElementById('decResult');
  resultEl.innerHTML = (text || '(порожньо)') +
    (mismatches === 0
      ? '<span class="badge ok">OK</span>'
      : `<span class="badge err">⚠ ${mismatches}</span>`);

  setStatus(`Кандидат (${scanHistory.length}/${CONFIRM_STREAK})`, '');

  if (scanHistory.length >= CONFIRM_STREAK && !locking) {
    locking = true;
    setTimeout(() => finishScan(text, mismatches), LOCK_HOLD_MS);
  }
}

function finishScan(text, mismatches) {
  setStatus('Зафіксовано', mismatches === 0 ? 'ok' : 'warn');
  locking = false; // дозволяємо продовжити сканування наступного диска без перезапуску камери
  scanHistory = [];
}

/* ===================== ВКЛАДКИ ===================== */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['enc','dec'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'dec') {
    // decode-wrap щойно став видимим — clientWidth тепер коректний
    requestAnimationFrame(updateBlurMaskClip);
  } else {
    stopCam();
  }
}

onTextInput();
</script>
</body>
</html>
