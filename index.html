<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ромб-вишиванка — OpenCV.js Сканер</title>
<!-- Підключаємо вашу кастомну збірку OpenCV.js. 
     Якщо файл локальний, змініть шлях тут: -->
<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: #0b3d63; color: #fff; font-family: sans-serif; padding: 20px 12px 60px; }
  h1 { font-size: 16px; text-align: center; margin: 0 0 4px; font-weight: 600; }
  .subtitle { text-align: center; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .panel { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
  input[type=text] { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; margin-bottom: 12px; }
  select { flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; }
  select option { color: #000; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .row label { flex: 0 0 130px; margin-bottom: 0; }
  .row input[type=range] { flex: 1; }
  .row .val { width: 44px; text-align: right; font-family: monospace; font-size: 12px; }
  button { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.6); background: transparent; color: #fff; font-size: 14px; cursor: pointer; margin-top: 8px; }
  button:hover { background: rgba(255,255,255,0.1); }
  button.secondary { border-color: rgba(255,255,255,0.3); font-size: 13px; }
  canvas { display: block; margin: 0 auto; background: #08304f; border-radius: 8px; max-width: 100%; height: auto; }
  .cam-wrap canvas.guide { background: transparent; border-radius: 0; }
  .canvas-box { text-align: center; }
  .canvas-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); margin-top: 6px; }
  .results { font-family: monospace; font-size: 13px; line-height: 1.8; }
  .quad-line { display: flex; justify-content: space-between; gap: 8px; }
  .quad-line .ok { color: #7fdb7f; }
  .quad-line .bad { color: #ff8f8f; }
  .final-result { font-size: 18px; text-align: center; padding: 14px; margin-top: 10px; background: rgba(255,255,255,0.08); border-radius: 8px; }
  .final-result .label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 4px; }
  .capacity-note { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 6px; }
  .cam-wrap { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1 / 1; background: #000; border-radius: 8px; overflow: hidden; }
  .cam-placeholder { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color: rgba(255,255,255,0.4); font-size: 12px; text-align:center; padding: 20px; }
  .cam-live { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
  .cam-live.active { display: block; }
  .cam-wrap video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border: 2px solid rgba(255,255,255,0.4); z-index: 1; }
  .cam-wrap canvas.guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  .warn-note { font-size: 12px; color: #ffcf7f; margin-top: 6px; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-row button { margin-top: 0; }
  textarea { width: 100%; height: 260px; font-family: monospace; font-size: 11px; background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 8px; resize: vertical; }
</style>
</head>
<body>
<!-- Прихований canvas для OpenCV -->
<canvas id="hiddenCanvas" style="display:none;"></canvas>

<div class="wrap">
  <h1>Ромб-вишиванка — OpenCV.js</h1>
  <div class="subtitle">Геометріія через OpenCV (findContours + minAreaRect + JS boxPoints)</div>

  <div class="panel">
    <label>Фраза (укр. літери, пробіл, кома, крапка)</label>
    <input type="text" id="phraseInput" value="я тебе кохаю" maxlength="60" />
    <div class="row">
      <label>Розмір сектора (Q×Q)</label>
      <input type="range" id="qSize" min="4" max="16" value="8" step="1" />
      <span class="val" id="qSizeVal">8</span>
    </div>
    <div class="capacity-note" id="capacityNote"></div>
  </div>

  <div class="panel">
    <label>Поворот кожного квадранта</label>
    <div class="row"><label>Верхній-лівий</label><select id="rotTL"><option value="0">0°</option><option value="1">90°</option><option value="2">180°</option><option value="3">270°</option></select></div>
    <div class="row"><label>Верхній-правий</label><select id="rotTR"><option value="0">0°</option><option value="1" selected>90°</option><option value="2">180°</option><option value="3">270°</option></select></div>
    <div class="row"><label>Нижній-лівий</label><select id="rotBL"><option value="0">0°</option><option value="1">90°</option><option value="2">180°</option><option value="3" selected>270°</option></select></div>
    <div class="row"><label>Нижній-правий</label><select id="rotBR"><option value="0">0°</option><option value="1">90°</option><option value="2" selected>180°</option><option value="3">270°</option></select></div>
  </div>

  <div class="panel">
    <label>Схема для вишивки / друку</label>
    <div class="canvas-box">
      <canvas id="cleanCanvas" width="320" height="320"></canvas>
      <div class="canvas-label">Ось що треба вишити чи роздрукувати</div>
    </div>
    <button id="genSchemaBtn">Перемалювати схему</button>
  </div>

  <div class="panel">
    <label>Камера</label>
    <div class="warn-note">Авто-скан використовує OpenCV.js для пошуку контурів та вирівнювання (без cv.boxPoints).</div>
    <div class="cam-wrap" id="camWrap">
      <div class="cam-placeholder" id="camPlaceholder">Камеру ще не увімкнено</div>
      <div class="cam-live" id="camLive">
        <video id="camVideo" autoplay playsinline muted></video>
        <canvas id="guideCanvas" class="guide"></canvas>
      </div>
    </div>
    <button id="camToggleBtn">Увімкнути камеру</button>
    <button id="captureBtn">Захопити кадр і декодувати</button>
    <div class="row" style="margin-top:10px;">
      <label>Авто-скан (OpenCV)</label>
      <input type="checkbox" id="autoScanToggle" />
    </div>
    <div class="capacity-note" id="camStatus"></div>
  </div>

  <div class="panel results" id="camResultsBox"></div>

  <div class="panel">
    <label>Детальний лог</label>
    <textarea id="logBox" readonly></textarea>
    <div class="btn-row">
      <button class="secondary" id="copyLogBtn">Скопіювати лог</button>
      <button class="secondary" id="clearLogBtn">Очистити лог</button>
    </div>
  </div>
</div>

<script>
let cvReady = false;
function onOpenCvReady() {
  cvReady = true;
  log('OpenCV.js завантажено та готовий до роботи.');
}

function log(msg) {
  const box = document.getElementById('logBox');
  const time = new Date().toLocaleTimeString();
  box.value += `[${time}] ${msg}\n`;
  box.scrollTop = box.scrollHeight;
}

const LETTERS = ['а','б','в','г','ґ','д','е','є','ж','з','и','і','ї','й','к','л','м','н','о','п','р','с','т','у','ф','х','ц','ч','ш','щ','ь','ю','я'];
const SYMBOLS = [' ', ',', '.'];
const POLYBIUS = LETTERS.concat(SYMBOLS);

function charToBits(ch) {
  const idx = POLYBIUS.indexOf(ch);
  const safeIdx = idx === -1 ? POLYBIUS.indexOf(' ') : idx;
  const row = Math.floor(safeIdx / 6), col = safeIdx % 6;
  const bits = [];
  for (let i = 2; i >= 0; i--) bits.push((row >> i) & 1);
  for (let i = 2; i >= 0; i--) bits.push((col >> i) & 1);
  return bits;
}
function bitsToChar(bits) {
  let row = 0, col = 0;
  for (let i = 0; i < 3; i++) row = (row << 1) | bits[i];
  for (let i = 3; i < 6; i++) col = (col << 1) | bits[i];
  const idx = row * 6 + col;
  return POLYBIUS[idx] || '?';
}
function encodePhrase(phrase) {
  const clean = phrase.toLowerCase().split('').filter(ch => POLYBIUS.includes(ch));
  let bits = [];
  clean.forEach(ch => { bits = bits.concat(charToBits(ch)); });
  return { bits, charCount: clean.length };
}

const CELL = 20;
const CAM_GUIDE_FILL = 0.92;

function createStitchStamp(color) {
  const c = document.createElement('canvas');
  c.width = CELL; c.height = CELL;
  const sctx = c.getContext('2d');
  const pad = CELL * 0.12;
  sctx.strokeStyle = color;
  sctx.lineWidth = CELL * 0.3;
  sctx.lineCap = 'square';
  sctx.beginPath(); sctx.moveTo(pad, pad); sctx.lineTo(CELL - pad, CELL - pad); sctx.stroke();
  sctx.beginPath(); sctx.moveTo(CELL - pad, pad); sctx.lineTo(pad, CELL - pad); sctx.stroke();
  return c;
}
const RED_STAMP = createStitchStamp('#9e2b2b');
const BLACK_STAMP = createStitchStamp('#1a1a1a');

function borderSideUnits(Q) {
  const squareSize = 2 * Q * CELL;
  const off = CELL + CELL / 2;
  return squareSize + 2 * off;
}

function buildProximityOrder(Q) {
  const order = [];
  const maxD = 2 * (Q - 1);
  for (let d = 0; d <= maxD; d++) {
    const aMin = Math.max(0, d - (Q - 1));
    const aMax = Math.min(d, Q - 1);
    for (let a = aMin; a <= aMax; a++) {
      const b = d - a;
      const x = Q - 1 - a;
      const y = Q - 1 - b;
      order.push(y * Q + x);
    }
  }
  return order;
}

function updateCapacityNote() {
  const Q = parseInt(document.getElementById('qSize').value);
  const capacity = Q * Q;
  const maxChars = Math.floor(capacity / 6);
  document.getElementById('capacityNote').textContent = `Сектор ${Q}×${Q} = ${capacity} біт → максимум ~${maxChars} символів`;
}

function getQuadRotationMap() {
  return {
    '0,0': parseInt(document.getElementById('rotTL').value),
    '1,0': parseInt(document.getElementById('rotTR').value),
    '0,1': parseInt(document.getElementById('rotBL').value),
    '1,1': parseInt(document.getElementById('rotBR').value)
  };
}

function rotateIndex(rx, ry, Q, qIdx) {
  let x = rx, y = ry;
  for (let i = 0; i < qIdx; i++) { const nx = y, ny = Q - 1 - x; x = nx; y = ny; }
  return { x, y };
}

function drawFabricWeave(ctx, x0, y0, size, step) {
  ctx.save();
  ctx.strokeStyle = 'rgba(120,100,70,0.12)';
  ctx.lineWidth = 0.5;
  for (let x = x0; x <= x0 + size; x += step) { ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y0 + size); ctx.stroke(); }
  for (let y = y0; y <= y0 + size; y += step) { ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x0 + size, y); ctx.stroke(); }
  ctx.restore();
}

function drawCrossStitch(ctx, cx, cy, stamp) { ctx.drawImage(stamp, cx - CELL / 2, cy - CELL / 2); }

function drawBorderBand(ctx, squareSize) {
  const gap = CELL;
  const off = gap + CELL / 2;
  const spacing = 2 * CELL;
  const ringLen = squareSize + 2 * off;
  const pointsPerSide = Math.max(2, Math.round(ringLen / spacing) + 1);
  const pts = [];
  for (let k = 0; k < pointsPerSide; k++) { const v = -off + k * (ringLen / (pointsPerSide - 1)); pts.push([v, -off]); }
  for (let k = 1; k < pointsPerSide; k++) { const v = -off + k * (ringLen / (pointsPerSide - 1)); pts.push([squareSize + off, v]); }
  for (let k = 1; k < pointsPerSide; k++) { const v = squareSize + off - k * (ringLen / (pointsPerSide - 1)); pts.push([v, squareSize + off]); }
  for (let k = 1; k < pointsPerSide - 1; k++) { const v = squareSize + off - k * (ringLen / (pointsPerSide - 1)); pts.push([-off, v]); }
  for (const [x, y] of pts) drawCrossStitch(ctx, x, y, BLACK_STAMP);
}

function drawPattern(ctx, W, H, Q, dataBits, rotDeg, quadMap) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate((45 + rotDeg) * Math.PI / 180);
  const squareSize = 2 * Q * CELL;
  ctx.translate(-squareSize / 2, -squareSize / 2);
  const gap = CELL;
  const off = gap + CELL / 2;
  const outerPad = off + CELL;
  ctx.fillStyle = '#f2e9d8';
  ctx.fillRect(-outerPad, -outerPad, squareSize + outerPad * 2, squareSize + outerPad * 2);
  drawFabricWeave(ctx, -outerPad, -outerPad, squareSize + outerPad * 2, CELL * 0.5);
  drawBorderBand(ctx, squareSize);
  for (let qy = 0; qy < 2; qy++) {
    for (let qx = 0; qx < 2; qx++) {
      const qIdx = quadMap[qx + ',' + qy];
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const bitIdx = rotateIndex(rx, ry, Q, qIdx);
          const bit = dataBits[bitIdx.y * Q + bitIdx.x] || 0;
          if (!bit) continue;
          const px = qx * Q * CELL + rx * CELL + CELL / 2;
          const py = qy * Q * CELL + ry * CELL + CELL / 2;
          drawCrossStitch(ctx, px, py, RED_STAMP);
        }
      }
    }
  }
  ctx.restore();
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function generateSchema() {
  const phrase = document.getElementById('phraseInput').value;
  const Q = parseInt(document.getElementById('qSize').value);
  const quadMap = getQuadRotationMap();
  const { bits, charCount } = encodePhrase(phrase);
  const capacity = Q * Q;
  const order = buildProximityOrder(Q);
  const activeCount = Math.min(bits.length, capacity);
  const groundTruth = new Array(capacity).fill(0);
  for (let k = 0; k < activeCount; k++) groundTruth[order[k]] = bits[k];
  const canvasSize = Math.ceil((2 * Q * CELL + 5 * CELL) * Math.SQRT2) + 20;
  const cleanCanvas = document.getElementById('cleanCanvas');
  cleanCanvas.width = canvasSize; cleanCanvas.height = canvasSize;
  drawPattern(cleanCanvas.getContext('2d'), cleanCanvas.width, cleanCanvas.height, Q, groundTruth, 0, quadMap);
  log(`Схема перемальована: фраза="${phrase}" (${charCount} символів, ${bits.length} біт), Q=${Q}.`);
  updateCapacityNote();
  drawGuide();
}

let camStream = null;
async function toggleCamera() {
  const btn = document.getElementById('camToggleBtn');
  if (camStream) { stopCamera(); btn.textContent = 'Увімкнути камеру'; return; }
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    const video = document.getElementById('camVideo');
    video.srcObject = camStream;
    await video.play();
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camLive').classList.add('active');
    document.getElementById('camStatus').textContent = 'Камера увімкнена. Налаштуйте авто-скан.';
    btn.textContent = 'Вимкнути камеру';
    drawGuide();
    updateAutoScanState();
  } catch (e) { document.getElementById('camStatus').textContent = `Помилка камери: ${e.message}`; }
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('camVideo').srcObject = null;
  document.getElementById('camLive').classList.remove('active');
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camStatus').textContent = 'Камеру вимкнено.';
  updateAutoScanState();
}

function drawGuide() {
  const guideCanvas = document.getElementById('guideCanvas');
  if (!guideCanvas) return;
  const wrap = document.getElementById('camWrap');
  const size = wrap.clientWidth || 320;
  guideCanvas.width = size; guideCanvas.height = size;
  const gctx = guideCanvas.getContext('2d');
  gctx.clearRect(0, 0, size, size);
  const Q = parseInt(document.getElementById('qSize').value) || 8;
  const squareSize = 2 * Q * CELL;
  const off = CELL + CELL / 2;
  const fullExtent = (squareSize + 2 * (off + CELL)) * Math.SQRT2;
  const scale = (size * CAM_GUIDE_FILL) / fullExtent;
  gctx.save();
  gctx.translate(size / 2, size / 2);
  gctx.rotate(Math.PI / 4);
  gctx.scale(scale, scale);
  gctx.translate(-squareSize / 2, -squareSize / 2);
  gctx.strokeStyle = 'rgba(255,255,255,0.85)';
  gctx.lineWidth = 2 / scale;
  gctx.setLineDash([8 / scale, 8 / scale]);
  gctx.strokeRect(-off, -off, squareSize + off * 2, squareSize + off * 2);
  gctx.restore();
}
window.addEventListener('resize', drawGuide);

// ================================================================
// ЕТАП 2: ДАНІ (Зчитування бітів)
// ================================================================
function sampleBitsWithTransform(data, W, H, Q, quadMap, toCanvasFn, sampleRadius) {
  function lumAvgAt(cx, cy) {
    const x0 = Math.max(0, Math.round(cx - sampleRadius));
    const x1 = Math.min(W - 1, Math.round(cx + sampleRadius));
    const y0 = Math.max(0, Math.round(cy - sampleRadius));
    const y1 = Math.min(H - 1, Math.round(cy + sampleRadius));
    let sum = 0, count = 0;
    for (let yy = y0; yy <= y1; yy++) {
      for (let xx = x0; xx <= x1; xx++) {
        const i = (yy * W + xx) * 4;
        sum += data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
        count++;
      }
    }
    return count ? sum / count : 255;
  }

  const squareSize = 2 * Q * CELL;
  const cell = CELL;
  const results = [[], [], [], []];

  for (let qy = 0; qy < 2; qy++) {
    for (let qx = 0; qx < 2; qx++) {
      const qIdx = quadMap[qx + ',' + qy];
      const lums = [];
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const localX = -squareSize / 2 + qx * Q * cell + rx * cell + cell / 2;
          const localY = -squareSize / 2 + qy * Q * cell + ry * cell + cell / 2;
          const p = toCanvasFn(localX, localY);
          lums.push(lumAvgAt(p.x, p.y));
        }
      }
      let minL = 255, maxL = 0;
      for (const l of lums) { if (l < minL) minL = l; if (l > maxL) maxL = l; }
      const threshold = (minL + maxL) / 2;
      const bitsForQuad = new Array(Q * Q).fill(0);
      let k = 0;
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const bit = lums[k++] < threshold ? 1 : 0;
          const base = rotateIndex(rx, ry, Q, qIdx);
          bitsForQuad[base.y * Q + base.x] = bit;
        }
      }
      results[qIdx] = bitsForQuad;
    }
  }
  return { results };
}

function computeAgreement(quadResults, capacity) {
  let sumAgree = 0;
  for (let i = 0; i < capacity; i++) {
    let ones = 0;
    for (let q = 0; q < 4; q++) ones += quadResults[q][i];
    sumAgree += Math.max(ones, 4 - ones);
  }
  return sumAgree / (capacity * 4);
}

const ANALYSIS_SIZE = 360;
const AUTO_SCAN_INTERVAL_MS = 900;
const AUTO_MAX_ASPECT_DEV = 0.25;
const AUTO_MIN_DIAG_PX = 60;
const AUTO_MAX_DIAG_PX = ANALYSIS_SIZE * 0.98;
const AUTO_MIN_AGREEMENT = 0.82;

// ================================================================
// ФУНКЦІЯ-ЗАМІННИК cv.boxPoints (Чистий JavaScript)
// ================================================================
function getBoxPoints(rotatedRect) {
  const center = rotatedRect.center;
  const size = rotatedRect.size;
  const angle = rotatedRect.angle * Math.PI / 180.0;
  
  const cosA = Math.cos(angle);
  const sinA = Math.sin(angle);
  
  const hw = size.width / 2;
  const hh = size.height / 2;
  
  // Базові координати кутів відносно центру (до повороту)
  const baseCorners = [
    { x: -hw, y: -hh },
    { x:  hw, y: -hh },
    { x:  hw, y:  hh },
    { x: -hw, y:  hh }
  ];
  
  // Обертаємо їх на кут прямокутника та зміщуємо відносно центру
  return baseCorners.map(pt => {
    return {
      x: center.x + pt.x * cosA - pt.y * sinA,
      y: center.y + pt.x * sinA + pt.y * cosA
    };
  });
}

// ================================================================
// ЕТАП 1: ЯКІР (Геометріія) - ЧЕРЕЗ OPENCV.JS
// ================================================================
function autoDetectAndDecode() {
  if (!cvReady) {
    document.getElementById('camStatus').textContent = 'Очікування завантаження OpenCV.js...';
    return;
  }

  const video = document.getElementById('camVideo');
  const status = document.getElementById('camStatus');
  if (!camStream || video.readyState < 2) return;

  try {
    const Q = parseInt(document.getElementById('qSize').value);
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    hiddenCanvas.width = ANALYSIS_SIZE;
    hiddenCanvas.height = ANALYSIS_SIZE;
    const hctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
    
    const vw = video.videoWidth, vh = video.videoHeight;
    if (vw && vh) {
      const sSize = Math.min(vw, vh);
      const sx = (vw - sSize) / 2, sy = (vh - sSize) / 2;
      hctx.drawImage(video, sx, sy, sSize, sSize, 0, 0, ANALYSIS_SIZE, ANALYSIS_SIZE);
    }

    // 1. Підготовка зображення для OpenCV
    let src = cv.imread(hiddenCanvas);
    let gray = new cv.Mat();
    let binary = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

    // 2. Пошук контурів
    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();
    cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let maxArea = 0, maxIdx = -1;
    for (let i = 0; i < contours.size(); i++) {
      let area = cv.contourArea(contours.get(i));
      if (area > maxArea) { maxArea = area; maxIdx = i; }
    }

    if (maxIdx === -1 || maxArea < 500) {
      status.textContent = 'Шукаю рамку... (контур не знайдено)';
      src.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();
      return;
    }

    // 3. Мінімальний обертовий прямокутник
    let cnt = contours.get(maxIdx);
    let rotatedRect = cv.minAreaRect(cnt);
    
    let center = { x: rotatedRect.center.x, y: rotatedRect.center.y };
    let w = rotatedRect.size.width;
    let h = rotatedRect.size.height;
    
    // Звільняємо пам'ять WebAssembly (КРИТИЧНО для OpenCV.js)
    src.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete(); cnt.delete();

    let aspect = Math.max(w, h) / Math.max(1, Math.min(w, h));
    log(`OpenCV Якір: w=${w.toFixed(1)} h=${h.toFixed(1)} aspect=${aspect.toFixed(3)}`);

    if (aspect - 1 > AUTO_MAX_ASPECT_DEV) {
      status.textContent = `Форма не квадратна (${aspect.toFixed(2)}×) — вирівняй камеру.`;
      return;
    }

    const sideAvg = (w + h) / 2;
    const diagEquivalent = sideAvg * Math.SQRT2;
    if (diagEquivalent < AUTO_MIN_DIAG_PX || diagEquivalent > AUTO_MAX_DIAG_PX) {
      status.textContent = diagEquivalent < AUTO_MIN_DIAG_PX ? 'Забагато далеко — піднеси ближче.' : 'Занадто близько — трохи відсунь.';
      return;
    }

    // Отримуємо 4 кути через нашу кастомну JS-функцію
    let corners = getBoxPoints(rotatedRect);

    log('Якір: ПРИЙНЯТО (OpenCV). Перехід до Етапу 2 (дані).');

    // ===== ЕТАП 2: ДАНІ =====
    const refCorner = corners.reduce((b, c) => (c.y < b.y ? c : b), corners[0]);
    const baseAngle = Math.atan2(refCorner.y - center.y, refCorner.x - center.x);
    const scale = sideAvg / borderSideUnits(Q);
    const sampleRadius = Math.max(1, Math.round(CELL * 0.28 * scale));

    const quadMap = getQuadRotationMap();
    const phrase = document.getElementById('phraseInput').value;
    const { bits } = encodePhrase(phrase);
    const capacity = Q * Q;
    const order = buildProximityOrder(Q);
    const activeCount = Math.min(bits.length, capacity);
    const groundTruth = new Array(capacity).fill(0);
    for (let k = 0; k < activeCount; k++) groundTruth[order[k]] = bits[k];

    const imgData = hctx.getImageData(0, 0, ANALYSIS_SIZE, ANALYSIS_SIZE);

    function tryOrientation(k) {
      const localCornerAngle = Math.PI / 4 + k * (Math.PI / 2);
      const totalAngle = baseAngle - localCornerAngle;
      const cosA = Math.cos(totalAngle), sinA = Math.sin(totalAngle);
      const toCanvasFn = (lx, ly) => ({
        x: center.x + scale * (lx * cosA - ly * sinA),
        y: center.y + scale * (lx * sinA + ly * cosA)
      });
      const { results: quadReadings } = sampleBitsWithTransform(imgData.data, ANALYSIS_SIZE, ANALYSIS_SIZE, Q, quadMap, toCanvasFn, sampleRadius);
      return { k, agreement: computeAgreement(quadReadings, capacity), quadReadings };
    }

    let best = tryOrientation(0);
    if (best.agreement < AUTO_MIN_AGREEMENT) {
      for (let k = 1; k < 4; k++) {
        const candidate = tryOrientation(k);
        if (candidate.agreement > best.agreement) best = candidate;
      }
    }

    if (best.agreement < AUTO_MIN_AGREEMENT) {
      status.textContent = `Якір знайдено, але сектори не узгоджені (${(best.agreement * 100).toFixed(0)}%)`;
      return;
    }

    const votedBits = new Array(capacity).fill(0);
    for (let i = 0; i < capacity; i++) {
      let sum = 0;
      for (let q = 0; q < 4; q++) sum += best.quadReadings[q][i];
      votedBits[i] = sum >= 2 ? 1 : 0;
    }

    function bitsToPhrase(arr) {
      const seq = [];
      for (let k = 0; k < activeCount; k++) seq.push(arr[order[k]]);
      let out = '';
      for (let i = 0; i + 5 < seq.length; i += 6) out += bitsToChar(seq.slice(i, i + 6));
      return out;
    }
    function accuracy(arr) {
      let correct = 0;
      for (let k = 0; k < activeCount; k++) {
        if (arr[order[k]] === groundTruth[order[k]]) correct++;
      }
      return activeCount === 0 ? 100 : Math.round((correct / activeCount) * 100);
    }

    const votedAcc = accuracy(votedBits);
    const votedText = bitsToPhrase(votedBits);

    let html = `<div style="margin-bottom:8px;color:rgba(255,255,255,0.6)">OpenCV Автодетект: aspect=${aspect.toFixed(2)}, узгодженість=${(best.agreement * 100).toFixed(0)}%, орієнтація #${best.k}</div>`;
    for (let q = 0; q < 4; q++) {
      const acc = accuracy(best.quadReadings[q]);
      const text = bitsToPhrase(best.quadReadings[q]);
      const cls = acc === 100 ? 'ok' : (acc >= 85 ? '' : 'bad');
      html += `<div class="quad-line"><span>Сектор ${q + 1} (${acc}%)</span><span class="${cls}">"${escapeHtml(text)}"</span></div>`;
    }
    html += `<div class="final-result"><div class="label">Голосування (${votedAcc}% точності)</div>"${escapeHtml(votedText)}"</div>`;
    document.getElementById('camResultsBox').innerHTML = html;
    status.textContent = `Розпізнано автоматично! Точність: ${votedAcc}%`;

  } catch (e) {
    log(`ПОМИЛКА OpenCV: ${e.message}`);
    document.getElementById('camStatus').textContent = `Помилка: ${e.message}`;
  }
}

let autoScanTimerId = null;
function updateAutoScanState() {
  const checkbox = document.getElementById('autoScanToggle');
  const shouldRun = checkbox.checked && !!camStream;
  if (shouldRun && !autoScanTimerId) {
    autoScanTimerId = setInterval(autoDetectAndDecode, AUTO_SCAN_INTERVAL_MS);
  } else if (!shouldRun && autoScanTimerId) {
    clearInterval(autoScanTimerId);
    autoScanTimerId = null;
  }
}

document.getElementById('qSize').addEventListener('input', (e) => {
  document.getElementById('qSizeVal').textContent = e.target.value;
  updateCapacityNote();
  drawGuide();
});
['rotTL','rotTR','rotBL','rotBR'].forEach(id => document.getElementById(id).addEventListener('change', generateSchema));
document.getElementById('genSchemaBtn').addEventListener('click', generateSchema);
document.getElementById('camToggleBtn').addEventListener('click', toggleCamera);
document.getElementById('autoScanToggle').addEventListener('change', updateAutoScanState);
document.getElementById('copyLogBtn').addEventListener('click', () => {
  const box = document.getElementById('logBox'); box.select();
  navigator.clipboard.writeText(box.value).catch(() => document.execCommand('copy'));
});
document.getElementById('clearLogBtn').addEventListener('click', () => document.getElementById('logBox').value = '');

updateCapacityNote();
generateSchema();
log('Ініціалізація завершена. Чекаємо завантаження OpenCV.js...');
</script>
