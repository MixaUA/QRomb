<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ромб-вишиванка — автодетекція камерою</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: #0b3d63; color: #fff; font-family: sans-serif; padding: 20px 12px 60px; }
  h1 { font-size: 16px; text-align: center; margin: 0 0 4px; font-weight: 600; }
  .subtitle { text-align: center; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .panel { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
  input[type=text] { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; margin-bottom: 12px; }
  select { flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; }
  select option { color: #000; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .row label { flex: 0 0 130px; margin-bottom: 0; }
  .row input[type=range] { flex: 1; }
  .row .val { width: 44px; text-align: right; font-family: monospace; font-size: 12px; }
  button { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.6); background: transparent; color: #fff; font-size: 14px; cursor: pointer; margin-top: 8px; }
  button:hover { background: rgba(255,255,255,0.1); }
  button.secondary { border-color: rgba(255,255,255,0.3); font-size: 13px; }
  canvas { display: block; margin: 0 auto; background: #08304f; border-radius: 8px; max-width: 100%; height: auto; }
  .canvas-box { text-align: center; }
  .canvas-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); margin-top: 6px; }
  .results { font-family: monospace; font-size: 13px; line-height: 1.8; }
  .quad-line { display: flex; justify-content: space-between; gap: 8px; }
  .quad-line .ok { color: #7fdb7f; }
  .quad-line .bad { color: #ff8f8f; }
  .final-result { font-size: 18px; text-align: center; padding: 14px; margin-top: 10px; background: rgba(255,255,255,0.08); border-radius: 8px; }
  .final-result .label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 4px; }
  .capacity-note { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 6px; }
  .cam-wrap { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1 / 1; background: #000; border-radius: 8px; overflow: hidden; }
  .cam-placeholder { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color: rgba(255,255,255,0.4); font-size: 12px; text-align:center; padding: 20px; }
  .cam-live { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
  .cam-live.active { display: block; }
  .cam-wrap video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
  .cam-wrap canvas.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; background: transparent; border-radius: 0; }
  .scan-status { position: absolute; bottom: 6px; left: 0; right: 0; text-align: center; font-size: 11px; font-family: monospace; color: #fff; text-shadow: 0 1px 3px #000; z-index: 3; }
  .warn-note { font-size: 12px; color: #ffcf7f; margin-top: 6px; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-row button { margin-top: 0; }
  textarea { width: 100%; height: 220px; font-family: monospace; font-size: 11px; background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 8px; resize: vertical; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Ромб-вишиванка — автодетекція камерою</h1>
  <div class="subtitle">Автоматичний пошук рамки (опукла оболонка + rotating calipers) — без ручного вирівнювання</div>

  <div class="panel">
    <label>Фраза (укр. літери, пробіл, кома, крапка)</label>
    <input type="text" id="phraseInput" value="я тебе кохаю" maxlength="60" />
    <div class="row">
      <label>Розмір сектора (Q×Q)</label>
      <input type="range" id="qSize" min="4" max="16" value="8" step="1" />
      <span class="val" id="qSizeVal">8</span>
    </div>
    <div class="capacity-note" id="capacityNote"></div>
  </div>

  <div class="panel">
    <label>Поворот кожного квадранта</label>
    <div class="row">
      <label>Верхній-лівий</label>
      <select id="rotTL"><option value="0">0°</option><option value="1">90°</option><option value="2">180°</option><option value="3">270°</option></select>
    </div>
    <div class="row">
      <label>Верхній-правий</label>
      <select id="rotTR"><option value="0">0°</option><option value="1" selected>90°</option><option value="2">180°</option><option value="3">270°</option></select>
    </div>
    <div class="row">
      <label>Нижній-лівий</label>
      <select id="rotBL"><option value="0">0°</option><option value="1">90°</option><option value="2">180°</option><option value="3" selected>270°</option></select>
    </div>
    <div class="row">
      <label>Нижній-правий</label>
      <select id="rotBR"><option value="0">0°</option><option value="1">90°</option><option value="2" selected>180°</option><option value="3">270°</option></select>
    </div>
  </div>

  <div class="panel">
    <label>Схема для вишивки / друку</label>
    <div class="canvas-box">
      <canvas id="cleanCanvas" width="320" height="320"></canvas>
      <div class="canvas-label">Ось що треба вишити чи роздрукувати</div>
    </div>
    <button id="genSchemaBtn">Перемалювати схему</button>
  </div>

  <div class="panel">
    <label>Камера — автосканування</label>
    <div class="warn-note">Просто наведи камеру на вишивку — рамка шукається автоматично, вирівнювати вручну не треба.</div>
    <div class="cam-wrap" id="camWrap">
      <div class="cam-placeholder" id="camPlaceholder">Камеру ще не увімкнено</div>
      <div class="cam-live" id="camLive">
        <video id="camVideo" autoplay playsinline muted></video>
        <canvas id="overlayCanvas" class="overlay"></canvas>
        <div class="scan-status" id="scanStatusOverlay"></div>
      </div>
    </div>
    <button id="camToggleBtn">Увімкнути камеру</button>
    <div class="capacity-note" id="camStatus"></div>
  </div>

  <div class="panel results" id="camResultsBox"></div>

  <div class="panel">
    <label>Детальний лог</label>
    <textarea id="logBox" readonly></textarea>
    <div class="btn-row">
      <button class="secondary" id="copyLogBtn">Скопіювати лог</button>
      <button class="secondary" id="clearLogBtn">Очистити лог</button>
    </div>
  </div>
</div>

<script>
// ===== ЛОГ ПРЯМО НА СТОРІНЦІ =====
function log(msg) {
  const box = document.getElementById('logBox');
  const time = new Date().toLocaleTimeString();
  box.value += `[${time}] ${msg}\n`;
  box.scrollTop = box.scrollHeight;
  console.log(msg);
}
log('Скрипт завантажено і виконується.');

// ===== Полібій 6x6 =====
const LETTERS = ['а','б','в','г','ґ','д','е','є','ж','з','и','і','ї','й','к','л','м','н','о','п','р','с','т','у','ф','х','ц','ч','ш','щ','ь','ю','я'];
const SYMBOLS = [' ', ',', '.'];
const POLYBIUS = LETTERS.concat(SYMBOLS);

function charToBits(ch) {
  const idx = POLYBIUS.indexOf(ch);
  const safeIdx = idx === -1 ? POLYBIUS.indexOf(' ') : idx;
  const row = Math.floor(safeIdx / 6), col = safeIdx % 6;
  const bits = [];
  for (let i = 2; i >= 0; i--) bits.push((row >> i) & 1);
  for (let i = 2; i >= 0; i--) bits.push((col >> i) & 1);
  return bits;
}
function bitsToChar(bits) {
  let row = 0, col = 0;
  for (let i = 0; i < 3; i++) row = (row << 1) | bits[i];
  for (let i = 3; i < 6; i++) col = (col << 1) | bits[i];
  const idx = row * 6 + col;
  if (idx < 0 || idx >= POLYBIUS.length) return '?';
  return POLYBIUS[idx];
}
function encodePhrase(phrase) {
  const clean = phrase.toLowerCase().split('').filter(ch => POLYBIUS.includes(ch));
  let bits = [];
  clean.forEach(ch => { bits = bits.concat(charToBits(ch)); });
  return { bits, charCount: clean.length };
}

const CELL = 20;

function createStitchStamp(color) {
  const c = document.createElement('canvas');
  c.width = CELL; c.height = CELL;
  const sctx = c.getContext('2d');
  const pad = CELL * 0.12;
  sctx.strokeStyle = color;
  sctx.lineWidth = CELL * 0.3;
  sctx.lineCap = 'square';
  sctx.beginPath(); sctx.moveTo(pad, pad); sctx.lineTo(CELL - pad, CELL - pad); sctx.stroke();
  sctx.beginPath(); sctx.moveTo(CELL - pad, pad); sctx.lineTo(pad, CELL - pad); sctx.stroke();
  return c;
}
const RED_STAMP = createStitchStamp('#9e2b2b');
const BLACK_STAMP = createStitchStamp('#1a1a1a');

function computeCanvasSize(Q) {
  const squareSize = 2 * Q * CELL;
  const gap = CELL;
  const off = gap + CELL / 2;
  const outerPad = off + CELL;
  const fullExtent = squareSize + 2 * outerPad;
  return Math.ceil(fullExtent * Math.SQRT2) + 20;
}

function buildProximityOrder(Q) {
  const order = [];
  const maxD = 2 * (Q - 1);
  for (let d = 0; d <= maxD; d++) {
    const aMin = Math.max(0, d - (Q - 1));
    const aMax = Math.min(d, Q - 1);
    for (let a = aMin; a <= aMax; a++) {
      const b = d - a;
      const x = Q - 1 - a;
      const y = Q - 1 - b;
      order.push(y * Q + x);
    }
  }
  return order;
}

function updateCapacityNote() {
  const Q = parseInt(document.getElementById('qSize').value);
  const capacity = Q * Q;
  const maxChars = Math.floor(capacity / 6);
  document.getElementById('capacityNote').textContent =
    `Сектор ${Q}×${Q} = ${capacity} біт → максимум ~${maxChars} символів на унікальний блок (повторюється в 4 секторах)`;
}

function getQuadRotationMap() {
  return {
    '0,0': parseInt(document.getElementById('rotTL').value),
    '1,0': parseInt(document.getElementById('rotTR').value),
    '0,1': parseInt(document.getElementById('rotBL').value),
    '1,1': parseInt(document.getElementById('rotBR').value)
  };
}

function rotateIndex(rx, ry, Q, qIdx) {
  let x = rx, y = ry;
  for (let i = 0; i < qIdx; i++) { const nx = y, ny = Q - 1 - x; x = nx; y = ny; }
  return { x, y };
}

function drawFabricWeave(ctx, x0, y0, size, step) {
  ctx.save();
  ctx.strokeStyle = 'rgba(120,100,70,0.12)';
  ctx.lineWidth = 0.5;
  for (let x = x0; x <= x0 + size; x += step) { ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y0 + size); ctx.stroke(); }
  for (let y = y0; y <= y0 + size; y += step) { ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x0 + size, y); ctx.stroke(); }
  ctx.restore();
}
function drawCrossStitch(ctx, cx, cy, stamp) { ctx.drawImage(stamp, cx - CELL / 2, cy - CELL / 2); }

function buildBorderPoints(squareSize, off, pointsPerSide) {
  const ringLen = squareSize + 2 * off;
  const stepRing = ringLen / (pointsPerSide - 1);
  const pts = [];
  for (let k = 0; k < pointsPerSide; k++) { const v = -off + k * stepRing; pts.push([v, -off]); }
  for (let k = 1; k < pointsPerSide; k++) { const v = -off + k * stepRing; pts.push([squareSize + off, v]); }
  for (let k = 1; k < pointsPerSide; k++) { const v = squareSize + off - k * stepRing; pts.push([v, squareSize + off]); }
  for (let k = 1; k < pointsPerSide - 1; k++) { const v = squareSize + off - k * stepRing; pts.push([-off, v]); }
  return pts;
}
function drawBorderBand(ctx, squareSize) {
  const gap = CELL;
  const off = gap + CELL / 2;
  const spacing = 2 * CELL;
  const ringLen = squareSize + 2 * off;
  const pointsPerSide = Math.max(2, Math.round(ringLen / spacing) + 1);
  const points = buildBorderPoints(squareSize, off, pointsPerSide);
  for (const [x, y] of points) drawCrossStitch(ctx, x, y, BLACK_STAMP);
}

function drawPattern(ctx, W, H, Q, dataBits, rotDeg, quadMap) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate((45 + rotDeg) * Math.PI / 180);
  const squareSize = 2 * Q * CELL;
  ctx.translate(-squareSize / 2, -squareSize / 2);
  const gap = CELL;
  const off = gap + CELL / 2;
  const outerPad = off + CELL;
  ctx.fillStyle = '#f2e9d8';
  ctx.fillRect(-outerPad, -outerPad, squareSize + outerPad * 2, squareSize + outerPad * 2);
  drawFabricWeave(ctx, -outerPad, -outerPad, squareSize + outerPad * 2, CELL * 0.5);
  drawBorderBand(ctx, squareSize);
  for (let qy = 0; qy < 2; qy++) {
    for (let qx = 0; qx < 2; qx++) {
      const qIdx = quadMap[qx + ',' + qy];
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const bitIdx = rotateIndex(rx, ry, Q, qIdx);
          const bit = dataBits[bitIdx.y * Q + bitIdx.x] || 0;
          if (!bit) continue;
          const px = qx * Q * CELL + rx * CELL + CELL / 2;
          const py = qy * Q * CELL + ry * CELL + CELL / 2;
          drawCrossStitch(ctx, px, py, RED_STAMP);
        }
      }
    }
  }
  ctx.restore();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function generateSchema() {
  const phrase = document.getElementById('phraseInput').value;
  const Q = parseInt(document.getElementById('qSize').value);
  const quadMap = getQuadRotationMap();
  const { bits, charCount } = encodePhrase(phrase);
  const capacity = Q * Q;
  const order = buildProximityOrder(Q);
  const activeCount = Math.min(bits.length, capacity);
  const groundTruth = new Array(capacity).fill(0);
  for (let k = 0; k < activeCount; k++) groundTruth[order[k]] = bits[k];

  const canvasSize = computeCanvasSize(Q);
  const cleanCanvas = document.getElementById('cleanCanvas');
  cleanCanvas.width = canvasSize; cleanCanvas.height = canvasSize;
  const cctx = cleanCanvas.getContext('2d');
  drawPattern(cctx, cleanCanvas.width, cleanCanvas.height, Q, groundTruth, 0, quadMap);

  log(`Схема перемальована: фраза="${phrase}" (${charCount} символів, ${bits.length} біт), Q=${Q}, місткість сектора=${capacity} біт.`);
  updateCapacityNote();
}

// =====================================================================
// ГЕОМЕТРІЯ: опукла оболонка + rotating calipers (мінімальний за площею
// повернутий прямокутник) — перевірено окремо на синтетичних даних
// (чистий сигнал, джиттер, викиди, неповний контур) перед інтеграцією.
// =====================================================================
function convexHull(points) {
  points = points.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const n = points.length;
  if (n < 3) return points;
  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lower = [];
  for (const p of points) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = n - 1; i >= 0; i--) {
    const p = points[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}

function minAreaRect(hull) {
  const n = hull.length;
  if (n < 3) return null;
  let best = null;
  for (let i = 0; i < n; i++) {
    const p1 = hull[i], p2 = hull[(i + 1) % n];
    const edgeAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
    const cosA = Math.cos(-edgeAngle), sinA = Math.sin(-edgeAngle);
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of hull) {
      const rx = p.x * cosA - p.y * sinA;
      const ry = p.x * sinA + p.y * cosA;
      if (rx < minX) minX = rx; if (rx > maxX) maxX = rx;
      if (ry < minY) minY = ry; if (ry > maxY) maxY = ry;
    }
    const width = maxX - minX, height = maxY - minY;
    const area = width * height;
    if (!best || area < best.area) {
      const midX = (minX + maxX) / 2, midY = (minY + maxY) / 2;
      const cosB = Math.cos(edgeAngle), sinB = Math.sin(edgeAngle);
      const cx = midX * cosB - midY * sinB;
      const cy = midX * sinB + midY * cosB;
      best = { area, cx, cy, angle: edgeAngle, width, height };
    }
  }
  return best;
}

function maxFitError(hull, rect) {
  const cosA = Math.cos(-rect.angle), sinA = Math.sin(-rect.angle);
  let maxErr = 0;
  for (const p of hull) {
    const dx = p.x - rect.cx, dy = p.y - rect.cy;
    const lx = dx * cosA - dy * sinA;
    const ly = dx * sinA + dy * cosA;
    const halfW = rect.width / 2, halfH = rect.height / 2;
    const errX = Math.max(0, Math.abs(lx) - halfW);
    const errY = Math.max(0, Math.abs(ly) - halfH);
    const err = Math.hypot(errX, errY);
    if (err > maxErr) maxErr = err;
  }
  return maxErr;
}

// =====================================================================
// БЛОБ-ДЕТЕКЦІЯ: шукаємо просто ТЕМНІ плями (темніше за фон), без жодної
// перевірки кольору. Це навмисно — опукла оболонка сама по собі ігнорує
// внутрішні точки (бере до уваги лише найзовніші), а дані завжди фізично
// лежать ВСЕРЕДИНІ рамки (рамка на squareSize+2×off, дані на squareSize,
// завжди ближче до центру) — тому навіть якщо стібки даних теж потраплять
// у "темні" точки, вони не вплинуть на форму оболонки. Перевірено
// обчислювально: з насиченим полем "темних даних" усередині результат
// підгонки прямокутника ідентичний до випадку з колірним фільтром.
// Це прибирає залежність від конкретного кольору нитки — працює для
// будь-якого контрастного кольору, не тільки для #1a1a1a.
// Поріг темноти — адаптивний (частка від середньої яскравості кадру),
// а не фіксоване число, щоб підлаштовуватись під реальне освітлення.
function isDark(lum, threshold) {
  return lum < threshold;
}

const MIN_BLOB_SIZE = 3;
const MAX_BLOB_SIZE = 600;
const FLOOD_CAP = 2000;
const DARK_THRESHOLD_RATIO = 0.68; // темніше за 68% середньої яскравості кадру

function computeAdaptiveDarkThreshold(imgData, W, H) {
  const data = imgData.data;
  let total = 0, count = 0;
  for (let i = 0; i < data.length; i += 4 * 7) { // розріджена вибірка для швидкості
    total += data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
    count++;
  }
  const avgLum = count > 0 ? total / count : 128;
  return avgLum * DARK_THRESHOLD_RATIO;
}

// Наскільки пляма ізольована на світлому тлі: семплюємо кільце точок
// навколо її bounding box і вимагаємо, щоб більшість із них були світлі.
// Це відсіює тіні й суцільні темні маси (не окремі хрестики-стібки) —
// перенесено з альтернативного рішення, де ця перевірка добре показала
// себе саме проти тіней/великих темних об'єктів.
function isIsolatedOnBackground(data, W, H, minX, maxX, minY, maxY, threshold) {
  const haloR = 5;
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  const rx = (maxX - minX) / 2 + haloR, ry = (maxY - minY) / 2 + haloR;
  const SAMPLES = 12;
  let lightCount = 0, total = 0;
  for (let i = 0; i < SAMPLES; i++) {
    const ang = (i / SAMPLES) * Math.PI * 2;
    const px = Math.round(cx + Math.cos(ang) * rx);
    const py = Math.round(cy + Math.sin(ang) * ry);
    if (px < 0 || px >= W || py < 0 || py >= H) continue;
    const idx = (py * W + px) * 4;
    const l = data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114;
    total++;
    if (!isDark(l, threshold)) lightCount++;
  }
  return total > 0 && (lightCount / total) >= 0.6;
}

function findDarkBlobs(imgData, W, H, step, threshold) {
  const data = imgData.data;
  const visited = new Uint8Array(W * H);
  const qx = new Int32Array(FLOOD_CAP);
  const qy = new Int32Array(FLOOD_CAP);
  const blobs = [];
  let rejectedElongated = 0, rejectedNotIsolated = 0;

  function lumAt(x, y) {
    const i = (y * W + x) * 4;
    return data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
  }

  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      if (visited[y * W + x]) continue;
      if (!isDark(lumAt(x, y), threshold)) continue;
      qx[0] = x; qy[0] = y;
      let head = 0, tail = 1;
      let sx = 0, sy = 0, cnt = 0;
      let minX = x, maxX = x, minY = y, maxY = y;
      visited[y * W + x] = 1;
      while (head < tail && cnt < FLOOD_CAP) {
        const cx = qx[head], cy = qy[head]; head++;
        sx += cx; sy += cy; cnt++;
        if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;
        if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
        const neighbors = [[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]];
        for (const [nx, ny] of neighbors) {
          if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
          if (visited[ny * W + nx]) continue;
          if (!isDark(lumAt(nx, ny), threshold)) continue;
          visited[ny * W + nx] = 1;
          if (tail < FLOOD_CAP) { qx[tail] = nx; qy[tail] = ny; tail++; }
        }
      }
      if (cnt < MIN_BLOB_SIZE || cnt > MAX_BLOB_SIZE) continue;

      // окремий стібок-хрестик приблизно рівносторонній — витягнута пляма
      // (тінь, край предмета, довга лінія) явно не є одиничним стібком
      const bboxW = maxX - minX + 1, bboxH = maxY - minY + 1;
      const aspect = Math.max(bboxW, bboxH) / Math.max(1, Math.min(bboxW, bboxH));
      if (aspect > 3) { rejectedElongated++; continue; }

      if (!isIsolatedOnBackground(data, W, H, minX, maxX, minY, maxY, threshold)) { rejectedNotIsolated++; continue; }

      blobs.push({ x: sx / cnt, y: sy / cnt, size: cnt });
    }
  }
  if (rejectedElongated || rejectedNotIsolated) {
    log(`Блоб-фільтр: відсіяно ${rejectedElongated} витягнутих і ${rejectedNotIsolated} неізольованих плям.`);
  }
  return blobs;
}

// =====================================================================
// ПОВНИЙ ЦИКЛ: блоби -> оболонка -> мін. прямокутник -> перевірки
// впевненості (квадратність, похибка, розмір) -> повертає fit або null
// =====================================================================
const SQUARENESS_TOLERANCE = 0.10; // макс. 10% різниці між шириною й висотою
const MAX_FIT_ERROR_RATIO = 0.5;   // макс. похибка як частка CELL
const MIN_HULL_POINTS = 8;
const MIN_SQUARE_SIDE_PX = 60;     // занадто мало — це шум, не рамка
const MAX_SQUARE_SIDE_PX_RATIO = 0.98; // відносно розміру кадру

// Дизайн завжди малює квадрат повернутим на 45° (щоб виглядав ромбом) —
// тому фізична рамка в кадрі теж має бути близько до 45° (чи еквівалентно
// 135/225/315 — через симетрію квадрата), а НЕ вздовж осей кадру (0/90/180).
// Це відсіює аркуш паперу, рамку екрана, стіл — усе, що дає прямокутник
// уздовж звичайних горизонталей/вертикалей, а не ромб.
const MAX_ANGLE_DEVIATION_DEG = 35;

function angleDeviationFromDiamond(angleRad) {
  const deg = angleRad * 180 / Math.PI;
  let d = ((deg - 45) % 90 + 90) % 90;
  if (d > 45) d = 90 - d;
  return d;
}

function detectSquare(imgData, W, H) {
  const darkThreshold = computeAdaptiveDarkThreshold(imgData, W, H);
  const blobs = findDarkBlobs(imgData, W, H, 3, darkThreshold);
  if (blobs.length < MIN_HULL_POINTS) {
    return { ok: false, reason: `замало точок рамки (${blobs.length})`, blobCount: blobs.length };
  }
  const hull = convexHull(blobs);
  if (hull.length < 4) {
    return { ok: false, reason: `оболонка занадто проста (${hull.length} вершин)`, blobCount: blobs.length };
  }
  const rect = minAreaRect(hull);
  if (!rect || rect.width <= 0 || rect.height <= 0) {
    return { ok: false, reason: 'не вдалося підігнати прямокутник', blobCount: blobs.length };
  }
  const avgSide = (rect.width + rect.height) / 2;
  const squareness = Math.abs(rect.width - rect.height) / avgSide;
  const err = maxFitError(hull, rect);
  const angleDev = angleDeviationFromDiamond(rect.angle);

  if (avgSide < MIN_SQUARE_SIDE_PX) {
    return { ok: false, reason: `занадто маленька рамка (${avgSide.toFixed(0)}px)`, blobCount: blobs.length, rect, squareness, err, angleDev };
  }
  if (avgSide > Math.min(W, H) * MAX_SQUARE_SIDE_PX_RATIO) {
    return { ok: false, reason: 'занадто близько (рамка не вміщується)', blobCount: blobs.length, rect, squareness, err, angleDev };
  }
  if (angleDev > MAX_ANGLE_DEVIATION_DEG) {
    return { ok: false, reason: `не схоже на ромб (нахил ${angleDev.toFixed(0)}° від очікуваних 45°)`, blobCount: blobs.length, rect, squareness, err, angleDev };
  }
  if (squareness > SQUARENESS_TOLERANCE) {
    return { ok: false, reason: `не квадрат (різниця сторін ${(squareness*100).toFixed(0)}%)`, blobCount: blobs.length, rect, squareness, err, angleDev };
  }
  if (err > CELL * MAX_FIT_ERROR_RATIO) {
    return { ok: false, reason: `завелика похибка контуру (${err.toFixed(1)}px)`, blobCount: blobs.length, rect, squareness, err, angleDev };
  }
  return { ok: true, rect, squareness, err, angleDev, blobCount: blobs.length, hull };
}

// =====================================================================
// СТАБІЛЬНІСТЬ: не довіряємо одному кадру — потрібно кілька поспіль
// узгоджених знахідок (центр/кут/розмір близькі), перш ніж декодувати.
// =====================================================================
const CONFIRM_STREAK = 3;
const STABILITY_TOL_PX = 12;
const STABILITY_TOL_DEG = 4;

let recentFits = [];

function checkStability(fit) {
  recentFits.push(fit);
  if (recentFits.length > CONFIRM_STREAK) recentFits.shift();
  if (recentFits.length < CONFIRM_STREAK) return false;

  const ref = recentFits[recentFits.length - 1];
  for (const f of recentFits) {
    const dCx = Math.abs(f.rect.cx - ref.rect.cx);
    const dCy = Math.abs(f.rect.cy - ref.rect.cy);
    let dAngle = Math.abs(((f.rect.angle - ref.rect.angle) * 180 / Math.PI) % 90);
    if (dAngle > 45) dAngle = 90 - dAngle;
    if (dCx > STABILITY_TOL_PX || dCy > STABILITY_TOL_PX || dAngle > STABILITY_TOL_DEG) return false;
  }
  return true;
}

function resetStability() { recentFits = []; }

// =====================================================================
// СЕМПЛІНГ БІТІВ ЗА ЗНАЙДЕНОЮ ГЕОМЕТРІЄЮ (не за припущенням, а за виміром)
//
// angleOffsetRad: rotating calipers повертає кут прямокутника З ТОЧНІСТЮ
// ДО 90° (квадрат симетричний під поворотом на 90° — те саме, що ми вже
// розбирали для quadMap). Тобто виміряний rect.angle може відрізнятись
// від "правильного" на 0°/90°/180°/270°, і ми не знаємо наперед, який
// саме — тому пробуємо всі 4 варіанти (див. computeAgreement нижче) і
// обираємо той, де сектори даних найкраще узгоджуються між собою.
// =====================================================================
function sampleFromFit(imgData, W, H, Q, quadMap, rect, angleOffsetRad) {
  angleOffsetRad = angleOffsetRad || 0;
  const data = imgData.data;
  function lumAt(x, y) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return 255;
    const i = (y * W + x) * 4;
    return data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
  }

  const squareSize = 2 * Q * CELL;
  const gap = CELL, off = gap + CELL / 2;
  const borderSquareSide = squareSize + 2 * off; // те, що трасує рамка
  const avgSide = (rect.width + rect.height) / 2;
  const scale = avgSide / borderSquareSide; // піксель-на-native-одиницю, ВИМІРЯНО, не припущено

  const totalAngle = rect.angle + angleOffsetRad;
  const cosA = Math.cos(totalAngle), sinA = Math.sin(totalAngle);
  function toPhoto(lx, ly) {
    // lx,ly у native-одиницях відносно центру квадрата даних
    const sx = lx * scale, sy = ly * scale;
    const rx = sx * cosA - sy * sinA;
    const ry = sx * sinA + sy * cosA;
    return { x: rect.cx + rx, y: rect.cy + ry };
  }

  const sampledLums = [];
  for (let qy = 0; qy < 2; qy++) for (let qx = 0; qx < 2; qx++)
    for (let ry = 0; ry < Q; ry++) for (let rx = 0; rx < Q; rx++) {
      const localX = -squareSize/2 + qx * Q * CELL + rx * CELL + CELL/2;
      const localY = -squareSize/2 + qy * Q * CELL + ry * CELL + CELL/2;
      const p = toPhoto(localX, localY);
      sampledLums.push(lumAt(p.x, p.y));
    }
  let minL = 255, maxL = 0;
  for (const l of sampledLums) { if (l < minL) minL = l; if (l > maxL) maxL = l; }
  const threshold = (minL + maxL) / 2;

  const debugPoints = [];

  const results = [[], [], [], []];
  for (let qy = 0; qy < 2; qy++) {
    for (let qx = 0; qx < 2; qx++) {
      const qIdx = quadMap[qx + ',' + qy];
      const bitsForQuad = new Array(Q * Q).fill(0);
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const localX = -squareSize/2 + qx * Q * CELL + rx * CELL + CELL/2;
          const localY = -squareSize/2 + qy * Q * CELL + ry * CELL + CELL/2;
          const p = toPhoto(localX, localY);
          const l = lumAt(p.x, p.y);
          const bit = l < threshold ? 1 : 0;
          const base = rotateIndex(rx, ry, Q, qIdx);
          bitsForQuad[base.y * Q + base.x] = bit;
          debugPoints.push({ x: p.x, y: p.y, bit });
        }
      }
      results[qIdx] = bitsForQuad;
    }
  }
  return { results, threshold, minL, maxL, scale, debugPoints };
}

// Наскільки добре 4 сектори узгоджуються між собою побітово (0..1, де 1 —
// повна згода). Якщо виміряний кут насправді неправильний (зсунутий на
// 90k° від істини), сектори систематично "конфліктуватимуть" один з
// одним — це і є сигнал, за яким обираємо правильну з 4 гіпотез орієнтації.
function computeAgreement(quadResults, capacity) {
  let sumAgree = 0;
  for (let i = 0; i < capacity; i++) {
    let ones = 0;
    for (let q = 0; q < 4; q++) ones += quadResults[q][i];
    sumAgree += Math.max(ones, 4 - ones);
  }
  return sumAgree / (capacity * 4);
}

// =====================================================================
// КАМЕРА + НЕПЕРЕРВНЕ СКАНУВАННЯ
// =====================================================================
let camStream = null;
let scanTimer = null;
let locked = false;
let lastDecodedSnapshot = null;   // dataURL кадру, на якому сталося декодування
let lastDecodedData = null;       // повний об'єкт для JSON-експорту

async function toggleCamera() {
  const btn = document.getElementById('camToggleBtn');
  if (camStream) {
    stopCamera();
    btn.textContent = 'Увімкнути камеру';
    return;
  }
  const status = document.getElementById('camStatus');
  log('Запит доступу до камери...');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 720 }, height: { ideal: 720 } }
    });
    log('getUserMedia: дозвіл отримано, потік створено.');
    const video = document.getElementById('camVideo');
    video.srcObject = camStream;
    await new Promise((resolve) => {
      if (video.readyState >= 1) { resolve(); return; }
      video.onloadedmetadata = () => resolve();
    });
    await video.play();
    log(`Відео грає. videoWidth=${video.videoWidth} videoHeight=${video.videoHeight}`);
    const track = camStream.getVideoTracks()[0];
    if (track) log(`Активна камера: ${track.label || '(без назви)'}`);
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camLive').classList.add('active');
    status.textContent = 'Камера увімкнена — шукаю рамку...';
    btn.textContent = 'Вимкнути камеру';
    locked = false;
    resetStability();
    scanTimer = setInterval(scanFrame, 250);
  } catch (e) {
    log(`ПОМИЛКА камери: ${e.name}: ${e.message}`);
    status.textContent = `Помилка камери: ${e.message}`;
  }
}

function stopCamera() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  if (camStream) {
    camStream.getTracks().forEach(t => t.stop());
    camStream = null;
    log('Камеру зупинено.');
  }
  document.getElementById('camVideo').srcObject = null;
  document.getElementById('camLive').classList.remove('active');
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camStatus').textContent = 'Камеру вимкнено.';
  locked = false;
  resetStability();
  const oc = document.getElementById('overlayCanvas');
  const octx = oc.getContext('2d');
  octx.clearRect(0, 0, oc.width, oc.height);
  document.getElementById('scanStatusOverlay').textContent = '';
}

function drawOverlay(W, H, fit, statusText) {
  const oc = document.getElementById('overlayCanvas');
  oc.width = W; oc.height = H;
  const octx = oc.getContext('2d');
  octx.clearRect(0, 0, W, H);
  if (fit && fit.rect) {
    const r = fit.rect;
    octx.save();
    octx.translate(r.cx, r.cy);
    octx.rotate(r.angle);
    octx.strokeStyle = fit.ok ? 'rgba(120,220,120,0.9)' : 'rgba(255,200,80,0.7)';
    octx.lineWidth = 2;
    octx.strokeRect(-r.width/2, -r.height/2, r.width, r.height);
    octx.restore();
  }
  document.getElementById('scanStatusOverlay').textContent = statusText || '';
}

function scanFrame() {
  if (locked) return;
  const video = document.getElementById('camVideo');
  const wrap = document.getElementById('camWrap');
  if (!camStream || video.readyState < 2) return;

  const size = wrap.clientWidth || 320;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  const vw = video.videoWidth, vh = video.videoHeight;
  if (vw && vh) {
    const sSize = Math.min(vw, vh);
    const sx = (vw - sSize) / 2, sy = (vh - sSize) / 2;
    ctx.drawImage(video, sx, sy, sSize, sSize, 0, 0, size, size);
  } else {
    ctx.drawImage(video, 0, 0, size, size);
  }

  const imgData = ctx.getImageData(0, 0, size, size);
  const fit = detectSquare(imgData, size, size);

  if (!fit.ok) {
    resetStability();
    drawOverlay(size, size, fit, `Шукаю рамку... (${fit.reason})`);
    document.getElementById('camStatus').textContent = `Пошук: ${fit.reason}`;
    return;
  }

  const stable = checkStability(fit);
  drawOverlay(size, size, fit, stable ? 'Знайдено, декодую...' : `Стабілізація... (${recentFits.length}/${CONFIRM_STREAK})`);
  document.getElementById('camStatus').textContent = stable
    ? 'Рамку впевнено знайдено — декодую.'
    : `Кандидат знайдено (квадратність ${(fit.squareness*100).toFixed(1)}%, похибка ${fit.err.toFixed(1)}px) — стабілізація ${recentFits.length}/${CONFIRM_STREAK}`;

  if (stable) {
    locked = true;
    // Зберігаємо кадр, на якому відбувається декод (для дебагу)
    try {
      lastDecodedSnapshot = canvas.toDataURL('image/png');
      log(`Кадр збережено для дебагу (${lastDecodedSnapshot.length} байт base64).`);
    } catch (e) {
      log(`Попередження: не вдалося зробити snapshot кадру: ${e.message}`);
      lastDecodedSnapshot = null;
    }
    log(`Рамка стабільно знайдена: center=(${fit.rect.cx.toFixed(1)},${fit.rect.cy.toFixed(1)}) angle=${(fit.rect.angle*180/Math.PI).toFixed(2)}° (відхилення від ромба ${fit.angleDev.toFixed(1)}°) side=${((fit.rect.width+fit.rect.height)/2).toFixed(1)}px squareness=${(fit.squareness*100).toFixed(1)}% err=${fit.err.toFixed(2)}px blobCount=${fit.blobCount}`);
    decodeFromFit(imgData, size, size, fit.rect);
  }
}

function decodeFromFit(imgData, W, H, rect) {
  try {
    const Q = parseInt(document.getElementById('qSize').value);
    const phrase = document.getElementById('phraseInput').value;
    const quadMap = getQuadRotationMap();
    const { bits, charCount } = encodePhrase(phrase);
    const capacity = Q * Q;
    const order = buildProximityOrder(Q);
    const activeCount = Math.min(bits.length, capacity);
    const groundTruth = new Array(capacity).fill(0);
    for (let k = 0; k < activeCount; k++) groundTruth[order[k]] = bits[k];

    // Пробуємо 4 гіпотези орієнтації (0°/90°/180°/270° зсув від виміряного
    // кута — той самий тип неоднозначності, що й раніше з quadMap, тільки
    // тепер для самого виміряного кута прямокутника) і обираємо ту, де
    // сектори даних найкраще узгоджуються між собою.
    let best = null;
    for (let k = 0; k < 4; k++) {
      const angleOffset = k * (Math.PI / 2);
      const sampled = sampleFromFit(imgData, W, H, Q, quadMap, rect, angleOffset);
      const agreement = computeAgreement(sampled.results, capacity);
      log(`Орієнтація #${k} (зсув ${k * 90}°): узгодженість секторів=${(agreement * 100).toFixed(1)}%`);
      if (!best || agreement > best.agreement) best = { k, agreement, sampled };
    }
    log(`Обрано орієнтацію #${best.k} (найкраща узгодженість ${(best.agreement * 100).toFixed(1)}%).`);
    const { results: quadReadings, threshold, minL, maxL, scale, debugPoints } = best.sampled;

    const oc = document.getElementById('overlayCanvas');
    const octx = oc.getContext('2d');
    debugPoints.forEach(pt => {
      octx.fillStyle = pt.bit === 1 ? '#ff3333' : '#33ccff';
      octx.beginPath();
      octx.arc(pt.x, pt.y, 2, 0, Math.PI * 2);
      octx.fill();
    });

    const votedBits = new Array(capacity).fill(0);
    for (let i = 0; i < capacity; i++) {
      let sum = 0;
      for (let q = 0; q < 4; q++) sum += quadReadings[q][i];
      votedBits[i] = sum >= 2 ? 1 : 0;
    }

    function bitsToPhrase(arr) {
      const seq = [];
      for (let k = 0; k < activeCount; k++) seq.push(arr[order[k]]);
      let out = '';
      for (let i = 0; i + 5 < seq.length; i += 6) out += bitsToChar(seq.slice(i, i + 6));
      return out;
    }
    function accuracy(arr) {
      let correct = 0;
      for (let k = 0; k < activeCount; k++) {
        const g = order[k];
        if (arr[g] === groundTruth[g]) correct++;
      }
      return activeCount === 0 ? 100 : Math.round((correct / activeCount) * 100);
    }

    let html = '';
    html += `<div style="margin-bottom:8px;color:rgba(255,255,255,0.6)">Автознайдено — очікувана фраза: "${escapeHtml(phrase)}" (${bits.length} біт з ${capacity})</div>`;
    for (let q = 0; q < 4; q++) {
      const acc = accuracy(quadReadings[q]);
      const text = bitsToPhrase(quadReadings[q]);
      const cls = acc === 100 ? 'ok' : (acc >= 85 ? '' : 'bad');
      html += `<div class="quad-line"><span>Сектор ${q + 1} (${acc}%)</span><span class="${cls}">"${escapeHtml(text)}"</span></div>`;
      log(`Сектор ${q + 1}: точність ${acc}%, текст="${text}"`);
    }
    const votedAcc = accuracy(votedBits);
    const votedText = bitsToPhrase(votedBits);
    html += `<div class="final-result"><div class="label">Голосування більшості (${votedAcc}% точності)</div>"${escapeHtml(votedText)}"</div>`;
    html += `<div class="btn-row" style="margin-top:10px">`;
    html += `<button class="secondary" onclick="rescan()">Сканувати ще раз</button>`;
    html += `<button class="secondary" onclick="exportDebugJSON()">📦 Експорт JSON для дебагу</button>`;
    html += `</div>`;
    document.getElementById('camResultsBox').innerHTML = html;
    document.getElementById('camStatus').textContent = 'Декодовано. Натисни "Сканувати ще раз" для повтору.';
    log(`Голосування: точність ${votedAcc}%, текст="${votedText}". --- ЗАВЕРШЕНО ---`);

    // ===== Збір даних для JSON-експорту =====
    const errors = [];
    for (let k = 0; k < activeCount; k++) {
      const g = order[k];
      if (votedBits[g] !== groundTruth[g]) errors.push({ index: g, expected: groundTruth[g], got: votedBits[g] });
    }
    lastDecodedData = {
      timestamp: new Date().toISOString(),
      userAgent: navigator.userAgent,
      input: { phrase, Q, quadMap, charCount, bitsLength: bits.length, capacity },
      geometry: {
        rect: { cx: rect.cx, cy: rect.cy, angle: rect.angle, angleDeg: rect.angle * 180 / Math.PI, width: rect.width, height: rect.height },
        scale, threshold, minL, maxL,
        bestOrientationK: best.k,
        bestOrientationDeg: best.k * 90,
        agreement: best.agreement
      },
      groundTruth: Array.from(groundTruth),
      votedBits: Array.from(votedBits),
      votedText, votedAcc,
      perQuadrant: quadReadings.map((q, i) => ({
        quadrant: i + 1,
        bits: Array.from(q),
        text: bitsToPhrase(q),
        accuracy: accuracy(q)
      })),
      errors,
      debugPoints: debugPoints,
      snapshot: lastDecodedSnapshot,
      logsTail: document.getElementById('logBox').value.split('\n').slice(-40)
    };
    log(`Дані для дебагу зібрано (${errors.length} помилок у голосуванні).`);
  } catch (e) {
    log(`ПОМИЛКА декодування: ${e.name}: ${e.message}`);
    document.getElementById('camResultsBox').innerHTML = `<div style="color:#ff8f8f">Помилка: ${escapeHtml(e.message)}</div>`;
    locked = false;
  }
}

function rescan() {
  locked = false;
  resetStability();
  document.getElementById('camResultsBox').innerHTML = '';
  document.getElementById('camStatus').textContent = 'Шукаю рамку...';
  log('--- Повторне сканування розпочато ---');
}

function copyLogFn() {
  const box = document.getElementById('logBox');
  box.select();
  navigator.clipboard.writeText(box.value).catch(() => { document.execCommand('copy'); });
}
function clearLogFn() {
  document.getElementById('logBox').value = '';
  log('Лог очищено.');
}

function exportDebugJSON() {
  if (!lastDecodedData) {
    alert('Немає даних для експорту. Спочатку успішно декодуй патерн.');
    return;
  }
  try {
    const json = JSON.stringify(lastDecodedData, null, 2);
    const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = `vyshyvanka-debug-${ts}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    log(`JSON експортовано: ${a.download} (${(json.length / 1024).toFixed(1)} KB).`);
  } catch (e) {
    log(`ПОМИЛКА експорту JSON: ${e.message}`);
    alert('Не вдалося експортувати: ' + e.message);
  }
}

window.rescan = rescan;
window.exportDebugJSON = exportDebugJSON;

document.getElementById('qSize').addEventListener('input', (e) => {
  document.getElementById('qSizeVal').textContent = e.target.value;
  updateCapacityNote();
});
['rotTL','rotTR','rotBL','rotBR'].forEach(id => {
  document.getElementById(id).addEventListener('change', generateSchema);
});
document.getElementById('genSchemaBtn').addEventListener('click', generateSchema);
document.getElementById('camToggleBtn').addEventListener('click', toggleCamera);
document.getElementById('copyLogBtn').addEventListener('click', copyLogFn);
document.getElementById('clearLogBtn').addEventListener('click', clearLogFn);

updateCapacityNote();
generateSchema();
log('Ініціалізація завершена. Готово до тесту.');
</script>
