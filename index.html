<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сканер диска</title>
<style>
* { box-sizing: border-box; }

html, body {
  overflow-x: hidden;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #0b3d63;
  font-family: sans-serif;
  color: #fff;
  padding: 12px;
}

/* ===== ВЕРХНІЙ ПЕРЕМИКАЧ МОВИ ===== */

.top-controls {
  position: fixed;
  top: 16px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  z-index: 20;
}

.lang-toggle {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.85);
  background: transparent;
  color: #fff;
  font-family: monospace;
  font-size: 12px;
  letter-spacing: 0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s ease;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
.lang-toggle:focus, .lang-toggle:focus-visible { outline: none; }
.lang-toggle:active { background: transparent; }
.lang-toggle.pressed { background: rgba(255,255,255,0.25); }
@media (hover: hover) {
  .lang-toggle:hover { background: rgba(255,255,255,0.1); }
}

/* ===== АКОРДЕОН З ОКОМ ===== */

.accordion-container {
  width: min(460px, 92vw);
  min-height: 460px;
  margin-top: 50px;
  background-color: #0b3d63;
  position: relative;
  display: grid;
  /* старт: верхній рядок (сканер) згорнутий, роздільник фіксований, низ (текст) займає решту */
  grid-template-rows: 0fr auto 1fr;
  transition: grid-template-rows 2.2s cubic-bezier(0.77, 0, 0.175, 1);
}

.content-area {
  overflow: hidden;
  box-sizing: border-box;
  padding: 0 6px;
  color: #fff;
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 2.2s cubic-bezier(0.77, 0, 0.175, 1);
}

.content-inner {
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}

.top-content { grid-template-rows: 0fr; }
.bottom-content { grid-template-rows: 1fr; }

.top-content .content-inner {
  padding-bottom: 24px;
}

/* стрілка вниз натиснута — сканер відкрито, око розплющене */
.accordion-container.state-down { grid-template-rows: 1fr auto 0fr; }
.accordion-container.state-down .top-content { grid-template-rows: 1fr; }
.accordion-container.state-down .bottom-content { grid-template-rows: 0fr; }

.divider-wrapper {
  width: 100%;
  max-width: 320px;
  height: 120px;
  margin: 0 auto 36px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 10;
}

.line {
  flex-grow: 1;
  height: 2px;
  background-color: rgba(255, 255, 255, 0.9);
}

.eye-box {
  width: 130px;
  height: 90px;
  position: relative;
  flex-shrink: 0;
}
.eye-box svg { width: 100%; height: 100%; }

.eye-outline, .eyelid, .arrow-btn {
  fill: none;
  stroke: rgba(255, 255, 255, 0.9);
  stroke-width: 2;
  vector-effect: non-scaling-stroke;
}

.eyelid {
  fill: #0b3d63;
  transform: translateY(0%);
  transition: transform 2.2s cubic-bezier(0.77, 0, 0.175, 1);
}

.pupil { fill: none; stroke: #ffffff; stroke-width: 16; }

.arrow-container {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 20px;
  cursor: pointer;
  z-index: 11;
}

.arrow-top {
  top: 0;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease 0s, visibility 0.4s ease 0s;
}
.arrow-bottom {
  bottom: 0;
  opacity: 1;
  visibility: visible;
  transition: opacity 0.4s ease 2.2s, visibility 0.4s ease 2.2s;
}

.arrow-btn { fill: #0b3d63; transition: fill 0.2s; }
.arrow-container:hover .arrow-btn { fill: rgba(255, 255, 255, 0.2); }

.accordion-container.state-down .eyelid { transform: translateY(-155%); }

.accordion-container.state-down .arrow-bottom {
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease 0s, visibility 0.4s ease 0s;
}
.accordion-container.state-down .arrow-top {
  opacity: 1;
  visibility: visible;
  transition: opacity 0.4s ease 2.2s, visibility 0.4s ease 2.2s;
}

/* ===== СКАНЕР ===== */

.scan-overlay {
  position: relative;
  width: 100%;
  max-width: 340px;
  aspect-ratio: 1 / 1;
  margin: 0 auto;
  border: 2px solid rgba(255,255,255,0.4);
  background: #000;
}

video {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 1;
}

#sampleCanvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: transparent;
  pointer-events: none;
  z-index: 2;
}

#decCanvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: transparent;
  pointer-events: none;
  z-index: 3;
}

#centerGuide {
  position: absolute; top: 50%; left: 50%;
  width: 68%; height: 68%;
  transform: translate(-50%, -50%);
  border: 2px dashed rgba(255,255,255,0.35);
  border-radius: 12px;
  pointer-events: none;
  z-index: 2;
  display: none;
}

.corner { position: absolute; width: 18px; height: 18px; z-index: 4; }
.corner.tl { top: 8px; left: 8px; border-top: 2px solid #fff; border-left: 2px solid #fff; }
.corner.tr { top: 8px; right: 8px; border-top: 2px solid #fff; border-right: 2px solid #fff; }
.corner.bl { bottom: 8px; left: 8px; border-bottom: 2px solid #fff; border-left: 2px solid #fff; }
.corner.br { bottom: 8px; right: 8px; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }

.scan-line {
  position: absolute;
  left: 3%; right: 3%;
  height: 2px;
  background: rgba(255,255,255,0.7);
  z-index: 5;
  top: 5%;
  animation: scanmove 2s ease-in-out infinite;
}
@keyframes scanmove {
  0%, 100% { top: 5%; }
  50% { top: 95%; }
}

.scan-status {
  font-size: 11px;
  font-family: monospace;
  color: rgba(255,255,255,0.6);
  min-height: 14px;
}

/* ===== РЕЗУЛЬТАТ (ПОСЛАННЯ) ===== */

.result-panel {
  width: 100%;
  padding: 24px 20px;
  max-width: 320px;
  margin: 0 auto;
  text-align: center;
}

.field-value {
  color: rgba(255,255,255,0.8);
  font-family: monospace;
  font-size: 18px;
  line-height: 1.7;
  font-style: italic;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.type-cursor {
  display: inline-block;
  color: rgba(255,255,255,0.75);
  font-style: normal;
  animation: caretBlink 0.85s steps(1) infinite;
}
.type-cursor.done, .type-cursor.idle { display: none; }

@keyframes caretBlink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="top-controls">
  <button class="lang-toggle" id="langToggle" onclick="toggleLang(this)">УКР</button>
</div>

<div class="accordion-container" id="accordion">

  <div class="content-area top-content">
    <div class="content-inner">
      <div class="scan-overlay">
        <video id="camVideo" autoplay playsinline muted></video>
        <canvas id="sampleCanvas" width="340" height="340"></canvas>
        <canvas id="decCanvas" width="340" height="340"></canvas>
        <div id="centerGuide"></div>
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
        <div class="scan-line"></div>
      </div>
      <div class="scan-status" id="scanStatus"></div>
    </div>
  </div>

  <div class="divider-wrapper">

    <div class="arrow-container arrow-top" id="btn-up" onclick="onUpArrow()">
      <svg viewBox="0 0 40 20">
        <polygon points="20,2 2,18 38,18" class="arrow-btn"/>
      </svg>
    </div>

    <div class="line"></div>

    <div class="eye-box">
      <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="blueprint-clip">
            <path d="M 20 100 Q 150 10, 280 100 Q 150 190, 20 100 Z" />
          </clipPath>
        </defs>
        <g clip-path="url(#blueprint-clip)">
          <circle cx="150" cy="100" r="24" class="pupil" />
          <path d="M 20 100 Q 150 -40, 280 100 L 280 350 L 20 350 Z" class="eyelid" />
        </g>
        <path d="M 20 100 Q 150 10, 280 100 Q 150 190, 20 100 Z" class="eye-outline" />
      </svg>
    </div>

    <div class="line"></div>

    <div class="arrow-container arrow-bottom" id="btn-down" onclick="onDownArrow()">
      <svg viewBox="0 0 40 20">
        <polygon points="2,2 38,2 20,18" class="arrow-btn"/>
      </svg>
    </div>

  </div>

  <div class="content-area bottom-content">
    <div class="content-inner">
      <div class="result-panel">
        <span class="field-value" id="msgText"></span><span class="type-cursor idle" id="msgCursor">▍</span>
      </div>
    </div>
  </div>

</div>

<script>
/* ================================================================
   МОВА ІНТЕРФЕЙСУ + АЛФАВІТ ДЕКОДУВАННЯ — той самий перемикач керує
   обома, бо диск може бути закодований і українською, і англійською,
   а декодер мусить знати, яку таблицю символів застосовувати.
   ================================================================ */
const ALPHABETS = {
  UK: "АБВГҐДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ0123456789 '.,@".split(''),
  EN: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .,-?!':\"@/&".split('')
};
const END_INDEX = 48;
let CURRENT_ALPHABET = ALPHABETS.UK;
let charToIndex = {};
function initAlphabet() {
  charToIndex = {};
  CURRENT_ALPHABET.forEach((c, i) => charToIndex[c] = i);
}
initAlphabet();
function indexToChar(i) { return CURRENT_ALPHABET[i] ?? '?'; }

const STR = {
  UK: {
    langBtn: 'УКР',
    placeholderStub: 'Тут з’явиться розшифроване послання.',
    statusSearchingAnchors: 'Пошук якорів...',
    statusStabilizing: 'Стабілізація геометрії...',
    statusTooClose: 'Занадто близько — трохи відсунь',
    statusRawNoise: 'Сирий шум, шукаю патерн...',
    statusHubUnconfirmed: 'Геометрія не підтверджена, шукаю...',
    statusCandidate: (cur, total) => `Кандидат (${cur}/${total})`,
    statusCameraError: (msg) => `Помилка камери: ${msg}`,
  },
  EN: {
    langBtn: 'ENG',
    placeholderStub: 'The decoded message will appear here.',
    statusSearchingAnchors: 'Searching anchors...',
    statusStabilizing: 'Stabilizing geometry...',
    statusTooClose: 'Too close — move back a bit',
    statusRawNoise: 'Raw noise, seeking pattern...',
    statusHubUnconfirmed: 'Geometry not confirmed, searching...',
    statusCandidate: (cur, total) => `Candidate (${cur}/${total})`,
    statusCameraError: (msg) => `Camera error: ${msg}`,
  }
};

function detectLang() {
  const saved = localStorage.getItem('camDiscLang');
  if (saved === 'UK' || saved === 'EN') return saved;
  const deviceLang = (navigator.language || 'en').slice(0, 2).toLowerCase();
  return (deviceLang === 'uk' || deviceLang === 'ru') ? 'UK' : 'EN';
}
let CURRENT_LANG = detectLang();
let showingStub = true; // чи зараз у полі повідомлення заглушка, а не реальний розшифрований текст

function toggleLang(btn) {
  CURRENT_LANG = CURRENT_LANG === 'UK' ? 'EN' : 'UK';
  CURRENT_ALPHABET = ALPHABETS[CURRENT_LANG];
  initAlphabet();
  localStorage.setItem('camDiscLang', CURRENT_LANG);
  applyLang();
  if (btn) {
    btn.blur();
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 180);
  }
}

function applyLang() {
  const t = STR[CURRENT_LANG];
  document.getElementById('langToggle').textContent = t.langBtn;
  if (showingStub) setStub();
}

function setStub() {
  revealToken++; // скасовує будь-яке незавершене друкування
  document.getElementById('msgText').textContent = STR[CURRENT_LANG].placeholderStub;
  document.getElementById('msgCursor').className = 'type-cursor idle';
  showingStub = true;
}

/* ================================================================
   ГЕОМЕТРІЯ ДИСКА (перенесено з кодера-сканера один в один)
   ================================================================ */
const CX = 240, CY = 240;
const ANCHOR_R = 200;
const START_ANGLE = Math.PI / 2;
const RINGS = 10;
const SECTORS = 12; // секторів на один символьний слот (6 даних + 6 дзеркало)
const INNER_R = 40, OUTER_R = 175;
const RING_GAP = (OUTER_R - INNER_R) / RINGS;
const HUB_R = 16;
const RING_SECTORS       = [12, 12, 12, 12, 24, 24, 24, 36, 36, 36];
const RING_SYMBOLS_COUNT = [ 1,  1,  1,  1,  2,  2,  2,  3,  3,  3];
const TOTAL_SYMBOLS = RING_SYMBOLS_COUNT.reduce((a, b) => a + b, 0); // = 19

/* 'dark'  = темний фон/світлі знаки, 'light' = світлий фон/темні знаки.
   За замовчуванням тепер світлий диск. Візуального перемикача немає,
   але тему можна змінити з коду через window.setDiscTheme('dark'|'light'). */
let DISC_THEME = 'light';

function setDiscTheme(theme) {
  DISC_THEME = theme === 'dark' ? 'dark' : 'light';
  scanHistory = [];
  resetTracking();
  lastTriangle = null;
  targetRingProgress = 0;
  ringProgress = 0;
}
window.setDiscTheme = setDiscTheme;

const ANCHOR_ANGLES = [90, 270, 210, 330].map(d => d * Math.PI / 180); // низ, верх, ліво, право
const SRC_BOTTOM = { x: CX + Math.cos(ANCHOR_ANGLES[0]) * ANCHOR_R, y: CY + Math.sin(ANCHOR_ANGLES[0]) * ANCHOR_R };
const SRC_TOP    = { x: CX + Math.cos(ANCHOR_ANGLES[1]) * ANCHOR_R, y: CY + Math.sin(ANCHOR_ANGLES[1]) * ANCHOR_R };
const SRC_LEFT   = { x: CX + Math.cos(ANCHOR_ANGLES[2]) * ANCHOR_R, y: CY + Math.sin(ANCHOR_ANGLES[2]) * ANCHOR_R };
const SRC_RIGHT  = { x: CX + Math.cos(ANCHOR_ANGLES[3]) * ANCHOR_R, y: CY + Math.sin(ANCHOR_ANGLES[3]) * ANCHOR_R };

/* ================================================================
   ДЕКОДЕР (камера) — перенесено з кодера-сканера один в один.
   ================================================================ */

const ANALYSIS_SIZE = 340;

const analysisCanvas = document.createElement('canvas');
analysisCanvas.width = ANALYSIS_SIZE;
analysisCanvas.height = ANALYSIS_SIZE;
const analysisCtx = analysisCanvas.getContext('2d', { willReadFrequently: true });

const visitedBuf = new Uint8Array(ANALYSIS_SIZE * ANALYSIS_SIZE);
const FLOOD_QUEUE_CAP = 4900;
const floodQueueX = new Int32Array(FLOOD_QUEUE_CAP);
const floodQueueY = new Int32Array(FLOOD_QUEUE_CAP);

const MIN_TRIANGLE_SIDE_PX = 40;
const MAX_TRIANGLE_SIDE_PX = 300;

const EXPECTED_ROTATION_RAD = Math.PI / 2;
const MAX_ROTATION_DEVIATION_DEG = 40;
const MAX_ROTATION_DEVIATION_RAD = (MAX_ROTATION_DEVIATION_DEG * Math.PI) / 180;

function angleDiffRad(a, b) {
  let diff = a - b;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  return diff;
}

const TRACKING_ENABLED = false;
const TRACKING_SEARCH_RADIUS = 70;
const TRACKING_LOST_AFTER = 5;
let trackedCenter = null;
let trackedMissCount = 0;

function resetTracking() { trackedCenter = null; trackedMissCount = 0; }
function handleTrackingHit(cx, cy) {
  if (!TRACKING_ENABLED) return;
  trackedCenter = { x: cx, y: cy };
  trackedMissCount = 0;
}
function handleTrackingMiss() {
  if (!TRACKING_ENABLED || !trackedCenter) return;
  trackedMissCount++;
  if (trackedMissCount >= TRACKING_LOST_AFTER) resetTracking();
}

let lastTriangle = null;
let targetRingProgress = 0;
let ringProgress = 0;
const RING_EASE = 0.18;
const ANCHOR_DOT_RADIUS_PX = 6;
const TRIANGLE_DASH = [6, 6];
let overlayAnimFrame = null;

const CONFIRM_STREAK = 3;
const LOCK_HOLD_MS = 550;
const NOISE_MISMATCH_THRESHOLD = 28; // ~25% від загальної кількості дзеркальних пар (114 при 19 символах)

let scanHistory = [];
let locking = false;
let camStream = null, scanTimer = null;
let lockHoldTimeoutId = null;

function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }

function solveLinearSystem(A, b) {
  const n = b.length;
  const M = A.map(row => row.slice());
  const B = b.slice();
  for (let col = 0; col < n; col++) {
    let maxRow = col;
    for (let r = col + 1; r < n; r++) if (Math.abs(M[r][col]) > Math.abs(M[maxRow][col])) maxRow = r;
    [M[col], M[maxRow]] = [M[maxRow], M[col]];
    [B[col], B[maxRow]] = [B[maxRow], B[col]];
    const pivot = M[col][col];
    for (let r = 0; r < n; r++) {
      if (r === col || pivot === 0) continue;
      const factor = M[r][col] / pivot;
      for (let c = col; c < n; c++) M[r][c] -= factor * M[col][c];
      B[r] -= factor * B[col];
    }
  }
  return M.map((row, i) => row[i] !== 0 ? B[i] / row[i] : 0);
}

function solveHomography(src, dst) {
  const A = [], b = [];
  for (let i = 0; i < 4; i++) {
    const { x, y } = src[i];
    const { x: xp, y: yp } = dst[i];
    A.push([x, y, 1, 0, 0, 0, -x * xp, -y * xp]); b.push(xp);
    A.push([0, 0, 0, x, y, 1, -x * yp, -y * yp]); b.push(yp);
  }
  const h = solveLinearSystem(A, b);
  return { h11: h[0], h12: h[1], h13: h[2], h21: h[3], h22: h[4], h23: h[5], h31: h[6], h32: h[7] };
}

function applyHomography(H, x, y) {
  const w = H.h31 * x + H.h32 * y + 1;
  return { x: (H.h11 * x + H.h12 * y + H.h13) / w, y: (H.h21 * x + H.h22 * y + H.h23) / w };
}

function drawFocusTriangle(displayCtx, W, H) {
  displayCtx.clearRect(0, 0, W, H);
  if (!lastTriangle) return;

  const vertices = lastTriangle;

  displayCtx.setLineDash(TRIANGLE_DASH);
  displayCtx.strokeStyle = 'rgba(255,255,255,0.6)';
  displayCtx.lineWidth = 2;
  displayCtx.beginPath();
  vertices.forEach((p, i) => { if (i === 0) displayCtx.moveTo(p.x, p.y); else displayCtx.lineTo(p.x, p.y); });
  displayCtx.closePath();
  displayCtx.stroke();
  displayCtx.setLineDash([]);

  const normalizedProgress = (ringProgress / CONFIRM_STREAK) * vertices.length;
  vertices.forEach((p, i) => {
    const alpha = Math.max(0, Math.min(1, normalizedProgress - i));
    if (alpha <= 0.01) return;
    displayCtx.fillStyle = `rgba(255, 209, 121, ${alpha})`;
    displayCtx.beginPath();
    displayCtx.arc(p.x, p.y, ANCHOR_DOT_RADIUS_PX, 0, Math.PI * 2);
    displayCtx.fill();
  });
}

function animateOverlay() {
  const dc = document.getElementById('decCanvas');
  const displayCtx = dc.getContext('2d');

  ringProgress += (targetRingProgress - ringProgress) * RING_EASE;
  if (Math.abs(targetRingProgress - ringProgress) < 0.01) ringProgress = targetRingProgress;

  drawFocusTriangle(displayCtx, dc.width, dc.height);

  overlayAnimFrame = requestAnimationFrame(animateOverlay);
}

async function startScan() {
  try {
    const video = document.getElementById('camVideo');
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 640 } }
    });
    video.srcObject = camStream;
    scanHistory = [];
    resetTracking();
    lastTriangle = null;
    targetRingProgress = 0;
    ringProgress = 0;
    locking = false;
    document.getElementById('centerGuide').style.display = 'block';
    setStatus(STR[CURRENT_LANG].statusSearchingAnchors);
    scanTimer = setInterval(scanFrame, 220);
    if (overlayAnimFrame) cancelAnimationFrame(overlayAnimFrame);
    overlayAnimFrame = requestAnimationFrame(animateOverlay);
  } catch (e) {
    setStatus(STR[CURRENT_LANG].statusCameraError(e.message));
    // не вдалось запустити камеру — повертаємо акордеон у стан очікування
    document.getElementById('accordion').classList.remove('state-down');
  }
}

function teardownCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  if (overlayAnimFrame) { cancelAnimationFrame(overlayAnimFrame); overlayAnimFrame = null; }
  if (lockHoldTimeoutId) { clearTimeout(lockHoldTimeoutId); lockHoldTimeoutId = null; }

  const video = document.getElementById('camVideo');
  video.pause();
  video.srcObject = null;

  resetTracking();
  lastTriangle = null;
  targetRingProgress = 0;
  ringProgress = 0;
  locking = false;
  scanHistory = [];

  const dc = document.getElementById('decCanvas');
  dc.getContext('2d').clearRect(0, 0, dc.width, dc.height);
  const sc = document.getElementById('sampleCanvas');
  sc.getContext('2d').clearRect(0, 0, sc.width, sc.height);
  document.getElementById('centerGuide').style.display = 'none';
  document.getElementById('scanStatus').textContent = '';
}

function stopScan() {
  teardownCamera();
}

function setStatus(text) {
  document.getElementById('scanStatus').textContent = text;
}

function scanFrame() {
  const video = document.getElementById('camVideo');
  if (!camStream || video.readyState < 2) return;

  const vw = video.videoWidth, vh = video.videoHeight;
  if (vw && vh) {
    const sSize = Math.min(vw, vh);
    const sx = (vw - sSize) / 2, sy = (vh - sSize) / 2;
    analysisCtx.drawImage(video, sx, sy, sSize, sSize, 0, 0, ANALYSIS_SIZE, ANALYSIS_SIZE);
  } else {
    analysisCtx.drawImage(video, 0, 0, ANALYSIS_SIZE, ANALYSIS_SIZE);
  }

  tryDecode();
}

function tryDecode() {
  if (locking) return;

  const sc = document.getElementById('sampleCanvas');
  const overlayCtx = sc.getContext('2d');
  overlayCtx.clearRect(0, 0, sc.width, sc.height);

  const W = ANALYSIS_SIZE, H = ANALYSIS_SIZE;
  const img = analysisCtx.getImageData(0, 0, W, H);
  const data = img.data;

  function lum(x, y) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return 255;
    const i = (y * W + x) * 4;
    return data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
  }

  const hist = new Uint32Array(256);
  let sampleCount = 0;
  for (let i = 0; i < data.length; i += 32) {
    const l = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
    hist[Math.min(255, Math.max(0, Math.round(l)))]++;
    sampleCount++;
  }
  let sumAll = 0;
  for (let t = 0; t < 256; t++) sumAll += t * hist[t];
  let sumB = 0, wB = 0, maxVar = 0, THRESH = 128;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = sampleCount - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sumAll - sumB) / wF;
    const varBetween = wB * wF * (mB - mF) * (mB - mF);
    if (varBetween > maxVar) { maxVar = varBetween; THRESH = t; }
  }
  function isMark(l) { return DISC_THEME === 'dark' ? l > THRESH : l < THRESH; }

  let searchX0 = 6, searchX1 = W - 6, searchY0 = 6, searchY1 = H - 6;
  if (TRACKING_ENABLED && trackedCenter) {
    searchX0 = Math.max(6, trackedCenter.x - TRACKING_SEARCH_RADIUS);
    searchX1 = Math.min(W - 6, trackedCenter.x + TRACKING_SEARCH_RADIUS);
    searchY0 = Math.max(6, trackedCenter.y - TRACKING_SEARCH_RADIUS);
    searchY1 = Math.min(H - 6, trackedCenter.y + TRACKING_SEARCH_RADIUS);
  }

  const markBlobs = [];
  visitedBuf.fill(0);
  const visited = visitedBuf;

  for (let y = searchY0; y < searchY1; y += 4) {
    for (let x = searchX0; x < searchX1; x += 4) {
      if (isMark(lum(x, y)) && !visited[y * W + x]) {
        floodQueueX[0] = x; floodQueueY[0] = y;
        let qHead = 0, qTail = 1;
        let sx = 0, sy = 0, cnt = 0;
        let minPX = Infinity, maxPX = -Infinity, minPY = Infinity, maxPY = -Infinity;
        while (qHead < qTail && cnt < 1200) {
          const px = floodQueueX[qHead], py = floodQueueY[qHead];
          qHead++;
          if (px < 0 || px >= W || py < 0 || py >= H || visited[py * W + px] || !isMark(lum(px, py))) continue;
          visited[py * W + px] = 1;
          sx += px; sy += py; cnt++;
          if (px < minPX) minPX = px;
          if (px > maxPX) maxPX = px;
          if (py < minPY) minPY = py;
          if (py > maxPY) maxPY = py;
          if (qTail + 4 <= floodQueueX.length) {
            floodQueueX[qTail] = px + 4; floodQueueY[qTail] = py; qTail++;
            floodQueueX[qTail] = px - 4; floodQueueY[qTail] = py; qTail++;
            floodQueueX[qTail] = px; floodQueueY[qTail] = py + 4; qTail++;
            floodQueueX[qTail] = px; floodQueueY[qTail] = py - 4; qTail++;
          }
        }
        if (cnt > 6 && cnt < 1200) {
          const bboxW = maxPX - minPX + 4;
          const bboxH = maxPY - minPY + 4;
          const fillRatio = (cnt * 16) / (bboxW * bboxH);
          const aspect = Math.max(bboxW, bboxH) / Math.min(bboxW, bboxH);
          if (fillRatio >= 0.5 && aspect <= 1.7) {
            markBlobs.push({ x: sx / cnt, y: sy / cnt, size: cnt });
          }
        }
      }
    }
  }

  markBlobs.sort((a, b) => b.size - a.size);
  if (markBlobs.length < 4) {
    handleTrackingMiss();
    lastTriangle = null;
    setStatus(STR[CURRENT_LANG].statusSearchingAnchors);
    return;
  }

  const EXP_DIAG = 2 * ANCHOR_R;
  const EXP_LONG_SIDE = ANCHOR_R * Math.sqrt(3);
  const EXP_SHORT_SIDE = ANCHOR_R;
  const QUAD_SHAPE_TOLERANCE = 0.35;

  const candidates = markBlobs.slice(0, Math.min(12, markBlobs.length));
  let bestQuad = null, bestScore = Infinity;
  let sawOversized = false;

  for (let i0 = 0; i0 < candidates.length; i0++) {
    for (let i1 = i0 + 1; i1 < candidates.length; i1++) {
      for (let i2 = i1 + 1; i2 < candidates.length; i2++) {
        for (let i3 = i2 + 1; i3 < candidates.length; i3++) {
          const pts = [candidates[i0], candidates[i1], candidates[i2], candidates[i3]];

          let bottom = pts[0], top = pts[0];
          for (const p of pts) {
            if (p.y > bottom.y) bottom = p;
            if (p.y < top.y) top = p;
          }
          if (bottom === top) continue;
          const rest = pts.filter(p => p !== bottom && p !== top);
          if (rest.length !== 2) continue;
          const left = rest[0].x <= rest[1].x ? rest[0] : rest[1];
          const right = rest[0].x <= rest[1].x ? rest[1] : rest[0];

          const dDiag = dist(bottom, top);
          if (dDiag > MAX_TRIANGLE_SIDE_PX * 1.3) { sawOversized = true; continue; }
          if (dDiag < MIN_TRIANGLE_SIDE_PX * 1.3) continue;

          const scale = dDiag / EXP_DIAG;
          function relErr(measured, expected) {
            const e = expected * scale;
            return Math.abs(measured - e) / e;
          }
          const errs = [
            relErr(dist(bottom, left), EXP_LONG_SIDE),
            relErr(dist(bottom, right), EXP_LONG_SIDE),
            relErr(dist(left, right), EXP_LONG_SIDE),
            relErr(dist(top, left), EXP_SHORT_SIDE),
            relErr(dist(top, right), EXP_SHORT_SIDE),
          ];
          const maxErr = Math.max(...errs);
          if (maxErr > QUAD_SHAPE_TOLERANCE) continue;

          const cx4 = (bottom.x + top.x + left.x + right.x) / 4;
          const cy4 = (bottom.y + top.y + left.y + right.y) / 4;
          const candRotation = Math.atan2(bottom.y - cy4, bottom.x - cx4);
          const deviation = Math.abs(angleDiffRad(candRotation, EXPECTED_ROTATION_RAD));
          if (deviation > MAX_ROTATION_DEVIATION_RAD) continue;

          const score = errs.reduce((a, b) => a + b, 0);
          if (score < bestScore) { bestScore = score; bestQuad = { bottom, top, left, right }; }
        }
      }
    }
  }

  if (!bestQuad) {
    handleTrackingMiss();
    lastTriangle = null;
    setStatus(sawOversized ? STR[CURRENT_LANG].statusTooClose : STR[CURRENT_LANG].statusStabilizing);
    return;
  }

  const { bottom: bottomAnchor, top: topAnchor, left: leftAnchor, right: rightAnchor } = bestQuad;
  const cx = (bottomAnchor.x + topAnchor.x + leftAnchor.x + rightAnchor.x) / 4;
  const cy = (bottomAnchor.y + topAnchor.y + leftAnchor.y + rightAnchor.y) / 4;
  handleTrackingHit(cx, cy);

  lastTriangle = [bottomAnchor, rightAnchor, topAnchor, leftAnchor];

  const transform = solveHomography(
    [SRC_BOTTOM, SRC_TOP, SRC_LEFT, SRC_RIGHT],
    [bottomAnchor, topAnchor, leftAnchor, rightAnchor]
  );

  const predictedHub = applyHomography(transform, CX, CY);
  const hubScaleEstimate = dist(bottomAnchor, topAnchor) / (2 * ANCHOR_R);
  const HUB_CHECK_TOLERANCE_PX = Math.max(12, hubScaleEstimate * HUB_R * 1.3);
  let hubOk = false;
  for (const b of markBlobs) {
    if (dist(b, predictedHub) < HUB_CHECK_TOLERANCE_PX) { hubOk = true; break; }
  }
  if (!hubOk) {
    handleTrackingMiss();
    scanHistory = [];
    targetRingProgress = 0;
    setStatus(STR[CURRENT_LANG].statusHubUnconfirmed);
    return;
  }

  const fgLum = lum(Math.round(bottomAnchor.x), Math.round(bottomAnchor.y));
  const bgAngleDiagram = 30 * Math.PI / 180;
  const bgRefRadius = (OUTER_R + ANCHOR_R) / 2;
  const bgDiagram = { x: CX + Math.cos(bgAngleDiagram) * bgRefRadius, y: CY + Math.sin(bgAngleDiagram) * bgRefRadius };
  const bgScreen = applyHomography(transform, bgDiagram.x, bgDiagram.y);
  const bgLum = lum(Math.round(bgScreen.x), Math.round(bgScreen.y));
  const MIN_CALIBRATION_SEPARATION = 15;
  if (Math.abs(fgLum - bgLum) >= MIN_CALIBRATION_SEPARATION) {
    THRESH = (fgLum + bgLum) / 2;
  }

  // --- зчитування кілець (змінна кількість секторів і символів) ---
  const indices = [];
  let totalMismatches = 0;
  let invalidRings = 0;

  for (let ring = 0; ring < RINGS; ring++) {
    const ringMidR = INNER_R + (ring + 0.5) * RING_GAP;
    const numSectors = RING_SECTORS[ring];
    const numSymbols = RING_SYMBOLS_COUNT[ring];

    const sampleAt = (sector) => {
      const midAngle = START_ANGLE + ((sector + 0.5) / numSectors) * Math.PI * 2;
      const diagramX = CX + Math.cos(midAngle) * ringMidR;
      const diagramY = CY + Math.sin(midAngle) * ringMidR;
      const { x: px, y: py } = applyHomography(transform, diagramX, diagramY);
      const l = lum(px, py);
      const bit = isMark(l) ? 1 : 0;
      overlayCtx.fillStyle = bit ? 'rgba(255,80,80,0.85)' : 'rgba(120,255,140,0.7)';
      overlayCtx.beginPath(); overlayCtx.arc(px, py, 2.5, 0, Math.PI * 2); overlayCtx.fill();
      return { bit, confidence: Math.abs(l - THRESH) };
    };

    for (let s = 0; s < numSymbols; s++) {
      const dataBase   = s * SECTORS;
      const mirrorBase = (numSymbols - s) * SECTORS - 1;
      const bits = [];
      for (let k = 0; k < 6; k++) {
        const left  = sampleAt(dataBase   + k);
        const right = sampleAt(mirrorBase - k);
        if (left.bit === right.bit) {
          bits.push(left.bit);
        } else {
          totalMismatches++;
          bits.push(left.confidence >= right.confidence ? left.bit : right.bit);
        }
      }
      const row = (bits[0] << 2) | (bits[1] << 1) | bits[2];
      const col = (bits[3] << 2) | (bits[4] << 1) | bits[5];
      if (row > 6 || col > 6) invalidRings++;
      indices.push(row * 7 + col);
    }
  }

  let text = '';
  for (const idx of indices) {
    if (idx === END_INDEX) break;
    text += indexToChar(idx);
  }

  registerReading(text, totalMismatches, invalidRings);
}

function registerReading(text, mismatches, invalidRings) {
  if (locking) return;

  if (mismatches > NOISE_MISMATCH_THRESHOLD || invalidRings > 0) {
    scanHistory = [];
    targetRingProgress = 0;
    setStatus(STR[CURRENT_LANG].statusRawNoise);
    return;
  }

  if (scanHistory.length && scanHistory[scanHistory.length - 1] === text) {
    scanHistory.push(text);
  } else {
    scanHistory = [text];
  }

  targetRingProgress = Math.min(scanHistory.length, CONFIRM_STREAK);
  setStatus(STR[CURRENT_LANG].statusCandidate(scanHistory.length, CONFIRM_STREAK));

  if (scanHistory.length >= CONFIRM_STREAK && !locking) {
    locking = true;
    lockHoldTimeoutId = setTimeout(() => finishScan(text), LOCK_HOLD_MS);
  }
}

/* Диск підтверджено — камера зупиняється, роздільник їде назад угору,
   око заплющується, а розшифрований текст друкується внизу замість
   заглушки. Нічого нікуди не зберігається — наступне сканування
   просто перезапише це поле заново. */
function finishScan(text) {
  teardownCamera();
  revealMessage(text || '(порожньо)');
  document.getElementById('accordion').classList.remove('state-down');
}

/* ===== АКОРДЕОН: керування стрілками ===== */

function onDownArrow() {
  const accordion = document.getElementById('accordion');
  if (accordion.classList.contains('state-down')) return; // вже відкрито/сканується
  setStub(); // прибираємо будь-яке попереднє розпізнане послання
  accordion.classList.add('state-down');
  startScan();
}

/* стрілка вгору під час сканування — перериває без результату й повертає все назад */
function onUpArrow() {
  stopScan();
  setStub(); // прибираємо будь-яке попереднє розпізнане послання
  document.getElementById('accordion').classList.remove('state-down');
}

/* ===== ВИВІД / ДРУКАРСЬКА МАШИНКА (одне поле — саме послання) ===== */

const ACCORDION_TRANSITION_MS = 2200; // збігається з CSS transition роздільника
const TYPE_SPEED_MS = 500;      // базовий інтервал між символами — «людський» темп
const TYPE_SPEED_JITTER_MS = 220; // випадковий розкид навколо базового інтервалу

let revealToken = 0;

/* друкує по символу з випадковим інтервалом навколо TYPE_SPEED_MS,
   щоб виглядало як людський набір тексту, а не рівномірний метроном */
function typeInto(elId, cursorId, text, myToken) {
  return new Promise((resolve) => {
    const el = document.getElementById(elId);
    const cursor = document.getElementById(cursorId);
    if (!el) { resolve(); return; }
    let i = 0;
    function typeNext() {
      if (myToken !== revealToken) { resolve(); return; }
      if (i >= text.length) {
        if (cursor) cursor.classList.add('done');
        resolve();
        return;
      }
      el.textContent += text[i];
      i++;
      const delay = TYPE_SPEED_MS + (Math.random() * 2 - 1) * TYPE_SPEED_JITTER_MS;
      setTimeout(typeNext, Math.max(150, delay));
    }
    typeNext();
  });
}

function pause(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

/* друкує розшифрований текст у полі повідомлення, замінюючи будь-яку
   заглушку чи попередній результат. Пауза перед стартом друку приблизно
   збігається з часом, за який роздільник встигає доїхати назад угору —
   текст не з'являється раніше, ніж око встигло заплющитись. */
async function revealMessage(text) {
  revealToken++;
  const myToken = revealToken;
  showingStub = false;

  const el = document.getElementById('msgText');
  const cursor = document.getElementById('msgCursor');
  el.textContent = '';
  cursor.classList.remove('idle', 'done');

  await pause(ACCORDION_TRANSITION_MS);
  if (myToken !== revealToken) return;

  await typeInto('msgText', 'msgCursor', text, myToken);
}

/* ===== ІНІЦІАЛІЗАЦІЯ ===== */
applyLang();
setStub();
</script>
