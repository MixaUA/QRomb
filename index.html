<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ромб-вишиванка — реальний тест камерою</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0b3d63;
    color: #fff;
    font-family: sans-serif;
    padding: 20px 12px 60px;
  }
  h1 { font-size: 16px; text-align: center; margin: 0 0 4px; font-weight: 600; }
  .subtitle { text-align: center; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .panel { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
  input[type=text] { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; margin-bottom: 12px; }
  select { flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; }
  select option { color: #000; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .row label { flex: 0 0 130px; margin-bottom: 0; }
  .row input[type=range] { flex: 1; }
  .row .val { width: 44px; text-align: right; font-family: monospace; font-size: 12px; }
  button { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.6); background: transparent; color: #fff; font-size: 14px; cursor: pointer; margin-top: 8px; }
  button:hover { background: rgba(255,255,255,0.1); }
  button.secondary { border-color: rgba(255,255,255,0.3); font-size: 13px; }
  canvas { display: block; margin: 0 auto; background: #08304f; border-radius: 8px; max-width: 100%; height: auto; }
  .cam-wrap canvas.guide { background: transparent; border-radius: 0; }
  .canvas-box { text-align: center; }
  .canvas-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); margin-top: 6px; }
  .results { font-family: monospace; font-size: 13px; line-height: 1.8; }
  .quad-line { display: flex; justify-content: space-between; gap: 8px; }
  .quad-line .ok { color: #7fdb7f; }
  .quad-line .bad { color: #ff8f8f; }
  .final-result { font-size: 18px; text-align: center; padding: 14px; margin-top: 10px; background: rgba(255,255,255,0.08); border-radius: 8px; }
  .final-result .label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 4px; }
  .capacity-note { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 6px; }
  .cam-wrap { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1 / 1; background: #000; border-radius: 8px; overflow: hidden; }
  .cam-placeholder { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color: rgba(255,255,255,0.4); font-size: 12px; text-align:center; padding: 20px; }
  .cam-live { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
  .cam-live.active { display: block; }
  .cam-wrap video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border: 2px solid rgba(255,255,255,0.4); z-index: 1; }
  .cam-wrap canvas.guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  .warn-note { font-size: 12px; color: #ffcf7f; margin-top: 6px; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-row button { margin-top: 0; }
  textarea { width: 100%; height: 220px; font-family: monospace; font-size: 11px; background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 8px; resize: vertical; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Ромб-вишиванка — реальний тест камерою</h1>
  <div class="subtitle">Без симуляції шуму — тільки те, що покаже справжня камера</div>

  <div class="panel">
    <label>Фраза (укр. літери, пробіл, кома, крапка)</label>
    <input type="text" id="phraseInput" value="я тебе кохаю" maxlength="60" />

    <div class="row">
      <label>Розмір сектора (Q×Q)</label>
      <input type="range" id="qSize" min="4" max="16" value="8" step="1" />
      <span class="val" id="qSizeVal">8</span>
    </div>
    <div class="capacity-note" id="capacityNote"></div>
  </div>

  <div class="panel">
    <label>Поворот кожного квадранта</label>
    <div class="row">
      <label>Верхній-лівий</label>
      <select id="rotTL"><option value="0">0°</option><option value="1">90°</option><option value="2">180°</option><option value="3">270°</option></select>
    </div>
    <div class="row">
      <label>Верхній-правий</label>
      <select id="rotTR"><option value="0">0°</option><option value="1" selected>90°</option><option value="2">180°</option><option value="3">270°</option></select>
    </div>
    <div class="row">
      <label>Нижній-лівий</label>
      <select id="rotBL"><option value="0">0°</option><option value="1">90°</option><option value="2">180°</option><option value="3" selected>270°</option></select>
    </div>
    <div class="row">
      <label>Нижній-правий</label>
      <select id="rotBR"><option value="0">0°</option><option value="1">90°</option><option value="2" selected>180°</option><option value="3">270°</option></select>
    </div>
  </div>

  <div class="panel">
    <label>Схема для вишивки / друку</label>
    <div class="canvas-box">
      <canvas id="cleanCanvas" width="320" height="320"></canvas>
      <div class="canvas-label">Ось що треба вишити чи роздрукувати</div>
    </div>
    <button id="genSchemaBtn">Перемалювати схему</button>
  </div>

  <div class="panel">
    <label>Камера</label>
    <div class="warn-note">Вирівняй фізичну вишивку по пунктирному контуру-гіду вручну, так само як прицілюєшся під QR.</div>
    <div class="cam-wrap" id="camWrap">
      <div class="cam-placeholder" id="camPlaceholder">Камеру ще не увімкнено</div>
      <div class="cam-live" id="camLive">
        <video id="camVideo" autoplay playsinline muted></video>
        <canvas id="guideCanvas" class="guide"></canvas>
      </div>
    </div>
    <button id="camToggleBtn">Увімкнути камеру</button>
    <button id="captureBtn">Захопити кадр і декодувати</button>
    <div class="capacity-note" id="camStatus"></div>
  </div>

  <div class="panel results" id="camResultsBox"></div>

  <div class="panel">
    <label>Детальний лог</label>
    <textarea id="logBox" readonly></textarea>
    <div class="btn-row">
      <button class="secondary" id="copyLogBtn">Скопіювати лог</button>
      <button class="secondary" id="clearLogBtn">Очистити лог</button>
    </div>
  </div>
</div>

<script>
// ===== ЛОГ ПРЯМО НА СТОРІНЦІ (не покладаємось на консоль) =====
function log(msg) {
  const box = document.getElementById('logBox');
  const time = new Date().toLocaleTimeString();
  box.value += `[${time}] ${msg}\n`;
  box.scrollTop = box.scrollHeight;
  console.log(msg);
}

log('Скрипт завантажено і виконується.');

// ===== Полібій 6x6 =====
const LETTERS = ['а','б','в','г','ґ','д','е','є','ж','з','и','і','ї','й','к','л','м','н','о','п','р','с','т','у','ф','х','ц','ч','ш','щ','ь','ю','я'];
const SYMBOLS = [' ', ',', '.'];
const POLYBIUS = LETTERS.concat(SYMBOLS);

function charToBits(ch) {
  const idx = POLYBIUS.indexOf(ch);
  const safeIdx = idx === -1 ? POLYBIUS.indexOf(' ') : idx;
  const row = Math.floor(safeIdx / 6), col = safeIdx % 6;
  const bits = [];
  for (let i = 2; i >= 0; i--) bits.push((row >> i) & 1);
  for (let i = 2; i >= 0; i--) bits.push((col >> i) & 1);
  return bits;
}
function bitsToChar(bits) {
  let row = 0, col = 0;
  for (let i = 0; i < 3; i++) row = (row << 1) | bits[i];
  for (let i = 3; i < 6; i++) col = (col << 1) | bits[i];
  const idx = row * 6 + col;
  if (idx < 0 || idx >= POLYBIUS.length) return '?';
  return POLYBIUS[idx];
}
function encodePhrase(phrase) {
  const clean = phrase.toLowerCase().split('').filter(ch => POLYBIUS.includes(ch));
  let bits = [];
  clean.forEach(ch => { bits = bits.concat(charToBits(ch)); });
  return { bits, charCount: clean.length };
}

const CELL = 20;

function createStitchStamp(color) {
  const c = document.createElement('canvas');
  c.width = CELL; c.height = CELL;
  const sctx = c.getContext('2d');
  const pad = CELL * 0.12;
  sctx.strokeStyle = color;
  sctx.lineWidth = CELL * 0.3;
  sctx.lineCap = 'square';
  sctx.beginPath(); sctx.moveTo(pad, pad); sctx.lineTo(CELL - pad, CELL - pad); sctx.stroke();
  sctx.beginPath(); sctx.moveTo(CELL - pad, pad); sctx.lineTo(pad, CELL - pad); sctx.stroke();
  return c;
}
const RED_STAMP = createStitchStamp('#9e2b2b');
const BLACK_STAMP = createStitchStamp('#1a1a1a');

function computeCanvasSize(Q) {
  const squareSize = 2 * Q * CELL;
  const gap = CELL;
  const off = gap + CELL / 2;
  const outerPad = off + CELL;
  const fullExtent = squareSize + 2 * outerPad;
  return Math.ceil(fullExtent * Math.SQRT2) + 20;
}

function buildProximityOrder(Q) {
  const order = [];
  const maxD = 2 * (Q - 1);
  for (let d = 0; d <= maxD; d++) {
    const aMin = Math.max(0, d - (Q - 1));
    const aMax = Math.min(d, Q - 1);
    for (let a = aMin; a <= aMax; a++) {
      const b = d - a;
      const x = Q - 1 - a;
      const y = Q - 1 - b;
      order.push(y * Q + x);
    }
  }
  return order;
}

function updateCapacityNote() {
  const Q = parseInt(document.getElementById('qSize').value);
  const capacity = Q * Q;
  const maxChars = Math.floor(capacity / 6);
  document.getElementById('capacityNote').textContent =
    `Сектор ${Q}×${Q} = ${capacity} біт → максимум ~${maxChars} символів на унікальний блок (повторюється в 4 секторах)`;
}

function getQuadRotationMap() {
  return {
    '0,0': parseInt(document.getElementById('rotTL').value),
    '1,0': parseInt(document.getElementById('rotTR').value),
    '0,1': parseInt(document.getElementById('rotBL').value),
    '1,1': parseInt(document.getElementById('rotBR').value)
  };
}

function rotateIndex(rx, ry, Q, qIdx) {
  let x = rx, y = ry;
  for (let i = 0; i < qIdx; i++) { const nx = y, ny = Q - 1 - x; x = nx; y = ny; }
  return { x, y };
}

function drawFabricWeave(ctx, x0, y0, size, step) {
  ctx.save();
  ctx.strokeStyle = 'rgba(120,100,70,0.12)';
  ctx.lineWidth = 0.5;
  for (let x = x0; x <= x0 + size; x += step) { ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y0 + size); ctx.stroke(); }
  for (let y = y0; y <= y0 + size; y += step) { ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x0 + size, y); ctx.stroke(); }
  ctx.restore();
}

function drawCrossStitch(ctx, cx, cy, stamp) {
  ctx.drawImage(stamp, cx - CELL / 2, cy - CELL / 2);
}

function buildBorderPoints(squareSize, off, pointsPerSide) {
  const ringLen = squareSize + 2 * off;
  const stepRing = ringLen / (pointsPerSide - 1);
  const pts = [];
  for (let k = 0; k < pointsPerSide; k++) { const v = -off + k * stepRing; pts.push([v, -off]); }
  for (let k = 1; k < pointsPerSide; k++) { const v = -off + k * stepRing; pts.push([squareSize + off, v]); }
  for (let k = 1; k < pointsPerSide; k++) { const v = squareSize + off - k * stepRing; pts.push([v, squareSize + off]); }
  for (let k = 1; k < pointsPerSide - 1; k++) { const v = squareSize + off - k * stepRing; pts.push([-off, v]); }
  return pts;
}

function drawBorderBand(ctx, squareSize) {
  const gap = CELL;
  const off = gap + CELL / 2;
  const spacing = 2 * CELL;
  const ringLen = squareSize + 2 * off;
  const pointsPerSide = Math.max(2, Math.round(ringLen / spacing) + 1);
  const points = buildBorderPoints(squareSize, off, pointsPerSide);
  for (const [x, y] of points) drawCrossStitch(ctx, x, y, BLACK_STAMP);
}

function drawPattern(ctx, W, H, Q, dataBits, rotDeg, quadMap) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate((45 + rotDeg) * Math.PI / 180);

  const squareSize = 2 * Q * CELL;
  ctx.translate(-squareSize / 2, -squareSize / 2);

  const gap = CELL;
  const off = gap + CELL / 2;
  const outerPad = off + CELL;

  ctx.fillStyle = '#f2e9d8';
  ctx.fillRect(-outerPad, -outerPad, squareSize + outerPad * 2, squareSize + outerPad * 2);
  drawFabricWeave(ctx, -outerPad, -outerPad, squareSize + outerPad * 2, CELL * 0.5);
  drawBorderBand(ctx, squareSize);

  for (let qy = 0; qy < 2; qy++) {
    for (let qx = 0; qx < 2; qx++) {
      const qIdx = quadMap[qx + ',' + qy];
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const bitIdx = rotateIndex(rx, ry, Q, qIdx);
          const bit = dataBits[bitIdx.y * Q + bitIdx.x] || 0;
          if (!bit) continue;
          const px = qx * Q * CELL + rx * CELL + CELL / 2;
          const py = qy * Q * CELL + ry * CELL + CELL / 2;
          drawCrossStitch(ctx, px, py, RED_STAMP);
        }
      }
    }
  }
  ctx.restore();
}

function readQuadrants(ctx, W, H, Q, rotDeg, quadMap) {
  const img = ctx.getImageData(0, 0, W, H);
  const d = img.data;
  function lumAt(x, y) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return 255;
    const i = (y * W + x) * 4;
    return d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
  }
  const squareSize = 2 * Q * CELL;
  const cell = CELL;
  const angle = (45 + rotDeg) * Math.PI / 180;
  const cosA = Math.cos(angle), sinA = Math.sin(angle);
  function toCanvas(lx, ly) {
    const rx = lx * cosA - ly * sinA;
    const ry = lx * sinA + ly * cosA;
    return { x: W/2 + rx, y: H/2 + ry };
  }

  const sampledLums = [];
  for (let qy = 0; qy < 2; qy++) {
    for (let qx = 0; qx < 2; qx++) {
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const localX = -squareSize/2 + qx * Q * cell + rx * cell + cell/2;
          const localY = -squareSize/2 + qy * Q * cell + ry * cell + cell/2;
          const p = toCanvas(localX, localY);
          sampledLums.push(lumAt(p.x, p.y));
        }
      }
    }
  }
  let minL = 255, maxL = 0;
  for (const l of sampledLums) { if (l < minL) minL = l; if (l > maxL) maxL = l; }
  const threshold = (minL + maxL) / 2;

  const results = [[], [], [], []];
  for (let qy = 0; qy < 2; qy++) {
    for (let qx = 0; qx < 2; qx++) {
      const qIdx = quadMap[qx + ',' + qy];
      const bitsForQuad = new Array(Q * Q).fill(0);
      for (let ry = 0; ry < Q; ry++) {
        for (let rx = 0; rx < Q; rx++) {
          const localX = -squareSize/2 + qx * Q * cell + rx * cell + cell/2;
          const localY = -squareSize/2 + qy * Q * cell + ry * cell + cell/2;
          const p = toCanvas(localX, localY);
          const l = lumAt(p.x, p.y);
          const bit = l < threshold ? 1 : 0;
          const base = rotateIndex(rx, ry, Q, qIdx);
          bitsForQuad[base.y * Q + base.x] = bit;
        }
      }
      results[qIdx] = bitsForQuad;
    }
  }
  return { results, threshold, minL, maxL };
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function generateSchema() {
  const phrase = document.getElementById('phraseInput').value;
  const Q = parseInt(document.getElementById('qSize').value);
  const quadMap = getQuadRotationMap();

  const { bits, charCount } = encodePhrase(phrase);
  const capacity = Q * Q;
  const order = buildProximityOrder(Q);
  const activeCount = Math.min(bits.length, capacity);
  const groundTruth = new Array(capacity).fill(0);
  for (let k = 0; k < activeCount; k++) groundTruth[order[k]] = bits[k];

  const canvasSize = computeCanvasSize(Q);
  const cleanCanvas = document.getElementById('cleanCanvas');
  cleanCanvas.width = canvasSize;
  cleanCanvas.height = canvasSize;
  const cctx = cleanCanvas.getContext('2d');
  drawPattern(cctx, cleanCanvas.width, cleanCanvas.height, Q, groundTruth, 0, quadMap);

  log(`Схема перемальована: фраза="${phrase}" (${charCount} символів, ${bits.length} біт), Q=${Q}, місткість сектора=${capacity} біт.`);
  updateCapacityNote();
  drawGuide();
}

// ===== КАМЕРА =====
let camStream = null;

async function toggleCamera() {
  const btn = document.getElementById('camToggleBtn');
  if (camStream) {
    stopCamera();
    btn.textContent = 'Увімкнути камеру';
    return;
  }
  const status = document.getElementById('camStatus');
  log('Запит доступу до камери...');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 720 }, height: { ideal: 720 } }
    });
    log('getUserMedia: дозвіл отримано, потік створено.');
    const video = document.getElementById('camVideo');
    video.srcObject = camStream;
    await new Promise((resolve) => {
      if (video.readyState >= 1) { resolve(); return; }
      video.onloadedmetadata = () => resolve();
    });
    log('Відео: метадані готові, викликаю play().');
    await video.play();
    log(`Відео грає. videoWidth=${video.videoWidth} videoHeight=${video.videoHeight}, paused=${video.paused}`);
    const track = camStream.getVideoTracks()[0];
    if (track) log(`Активна камера: ${track.label || '(без назви)'}`);
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camLive').classList.add('active');
    status.textContent = 'Камера увімкнена — вирівняй вишивку під пунктирний гід і натисни "Захопити".';
    btn.textContent = 'Вимкнути камеру';
    drawGuide();
  } catch (e) {
    log(`ПОМИЛКА камери: ${e.name}: ${e.message}`);
    status.textContent = `Помилка камери: ${e.message}`;
  }
}

function stopCamera() {
  if (camStream) {
    camStream.getTracks().forEach(t => t.stop());
    camStream = null;
    log('Камеру зупинено (треки завершено).');
  }
  document.getElementById('camVideo').srcObject = null;
  document.getElementById('camLive').classList.remove('active');
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camStatus').textContent = 'Камеру вимкнено.';
}

function drawGuide() {
  const guideCanvas = document.getElementById('guideCanvas');
  if (!guideCanvas) return;
  const wrap = document.getElementById('camWrap');
  const size = wrap.clientWidth || 320;
  guideCanvas.width = size; guideCanvas.height = size;
  const gctx = guideCanvas.getContext('2d');
  gctx.clearRect(0, 0, size, size);

  const Q = parseInt(document.getElementById('qSize').value) || 8;
  const squareSize = 2 * Q * CELL;
  const gap = CELL;
  const off = gap + CELL / 2;
  const fullExtent = (squareSize + 2 * (off + CELL)) * Math.SQRT2;
  const scale = (size * 0.92) / fullExtent;

  gctx.save();
  gctx.translate(size / 2, size / 2);
  gctx.rotate(Math.PI / 4);
  gctx.scale(scale, scale);
  gctx.translate(-squareSize / 2, -squareSize / 2);
  gctx.strokeStyle = 'rgba(255,255,255,0.85)';
  gctx.lineWidth = 2 / scale;
  gctx.setLineDash([8 / scale, 8 / scale]);
  gctx.strokeRect(-off, -off, squareSize + off * 2, squareSize + off * 2);
  gctx.restore();
}
window.addEventListener('resize', drawGuide);

function captureAndDecode() {
  log('--- Натиснуто "Захопити кадр і декодувати" ---');
  const video = document.getElementById('camVideo');
  const wrap = document.getElementById('camWrap');
  const status = document.getElementById('camStatus');

  log(`Перевірка стану: camStream=${!!camStream}, video.readyState=${video.readyState}`);
  if (!camStream || video.readyState < 2) {
    status.textContent = 'Спершу увімкни камеру і дочекайся зображення.';
    log('Зупинено: камера не готова (readyState < 2 або camStream відсутній).');
    return;
  }

  try {
    const Q = parseInt(document.getElementById('qSize').value);
    const phrase = document.getElementById('phraseInput').value;
    const quadMap = getQuadRotationMap();
    const { bits, charCount } = encodePhrase(phrase);
    const capacity = Q * Q;
    const order = buildProximityOrder(Q);
    const activeCount = Math.min(bits.length, capacity);
    const groundTruth = new Array(capacity).fill(0);
    for (let k = 0; k < activeCount; k++) groundTruth[order[k]] = bits[k];
    log(`Очікувана фраза "${phrase}" -> ${bits.length} біт з ${capacity}.`);

    const size = wrap.clientWidth || 320;
    const captureCanvas = document.createElement('canvas');
    captureCanvas.width = size; captureCanvas.height = size;
    const cctx = captureCanvas.getContext('2d', { willReadFrequently: true });

    const vw = video.videoWidth, vh = video.videoHeight;
    log(`Розмір відео: ${vw}x${vh}, розмір перегляду: ${size}x${size}`);
    if (vw && vh) {
      const sSize = Math.min(vw, vh);
      const sx = (vw - sSize) / 2, sy = (vh - sSize) / 2;
      cctx.drawImage(video, sx, sy, sSize, sSize, 0, 0, size, size);
    } else {
      cctx.drawImage(video, 0, 0, size, size);
    }
    log('Кадр намальовано на captureCanvas.');

    const squareSize = 2 * Q * CELL;
    const gap = CELL;
    const off = gap + CELL / 2;
    const fullExtent = (squareSize + 2 * (off + CELL)) * Math.SQRT2;
    const nativeSize = Math.ceil(fullExtent);

    const scaledCanvas = document.createElement('canvas');
    scaledCanvas.width = nativeSize; scaledCanvas.height = nativeSize;
    const sctx = scaledCanvas.getContext('2d', { willReadFrequently: true });
    sctx.drawImage(captureCanvas, 0, 0, size, size, 0, 0, nativeSize, nativeSize);
    log(`Масштабовано до nativeSize=${nativeSize}.`);

    const { results: quadReadings, threshold, minL, maxL } = readQuadrants(sctx, nativeSize, nativeSize, Q, 0, quadMap);
    log(`readQuadrants завершено. Поріг яскравості=${threshold.toFixed(1)} (min=${minL.toFixed(1)}, max=${maxL.toFixed(1)}).`);

    const votedBits = new Array(capacity).fill(0);
    for (let i = 0; i < capacity; i++) {
      let sum = 0;
      for (let q = 0; q < 4; q++) sum += quadReadings[q][i];
      votedBits[i] = sum >= 2 ? 1 : 0;
    }

    function bitsToPhrase(arr) {
      const seq = [];
      for (let k = 0; k < activeCount; k++) seq.push(arr[order[k]]);
      let out = '';
      for (let i = 0; i + 5 < seq.length; i += 6) out += bitsToChar(seq.slice(i, i + 6));
      return out;
    }
    function accuracy(arr) {
      let correct = 0;
      for (let k = 0; k < activeCount; k++) {
        const g = order[k];
        if (arr[g] === groundTruth[g]) correct++;
      }
      return activeCount === 0 ? 100 : Math.round((correct / activeCount) * 100);
    }

    const previewDataUrl = scaledCanvas.toDataURL('image/png');

    let html = '';
    html += `<div style="margin-bottom:8px;color:rgba(255,255,255,0.6)">Реальний кадр — очікувана фраза: "${escapeHtml(phrase)}" (${bits.length} біт з ${capacity})</div>`;
    html += `<img src="${previewDataUrl}" style="display:block;margin:0 auto 10px;max-width:200px;border-radius:6px;border:1px solid rgba(255,255,255,0.3)" />`;
    for (let q = 0; q < 4; q++) {
      const acc = accuracy(quadReadings[q]);
      const text = bitsToPhrase(quadReadings[q]);
      const cls = acc === 100 ? 'ok' : (acc >= 85 ? '' : 'bad');
      html += `<div class="quad-line"><span>Сектор ${q + 1} (${acc}%)</span><span class="${cls}">"${escapeHtml(text)}"</span></div>`;
      log(`Сектор ${q + 1}: точність ${acc}%, текст="${text}", біти=${quadReadings[q].join('')}`);
    }
    const votedAcc = accuracy(votedBits);
    const votedText = bitsToPhrase(votedBits);
    html += `<div class="final-result"><div class="label">Голосування більшості (${votedAcc}% точності)</div>"${escapeHtml(votedText)}"</div>`;
    document.getElementById('camResultsBox').innerHTML = html;
    status.textContent = `Кадр захоплено (${nativeSize}×${nativeSize}px).`;
    log(`Голосування: точність ${votedAcc}%, текст="${votedText}".`);
    log('--- ДЕКОДУВАННЯ ЗАВЕРШЕНО УСПІШНО ---');
  } catch (e) {
    log(`ПОМИЛКА під час декодування: ${e.name}: ${e.message}`);
    log(e.stack || '(стек недоступний)');
    status.textContent = `Помилка декодування: ${e.message}`;
    document.getElementById('camResultsBox').innerHTML =
      `<div style="color:#ff8f8f">Сталася помилка: ${escapeHtml(e.message)}. Деталі в лозі нижче.</div>`;
  }
}

function copyLogFn() {
  const box = document.getElementById('logBox');
  box.select();
  navigator.clipboard.writeText(box.value).catch(() => { document.execCommand('copy'); });
}
function clearLogFn() {
  document.getElementById('logBox').value = '';
  log('Лог очищено.');
}

document.getElementById('qSize').addEventListener('input', (e) => {
  document.getElementById('qSizeVal').textContent = e.target.value;
  updateCapacityNote();
  drawGuide();
});
['rotTL','rotTR','rotBL','rotBR'].forEach(id => {
  document.getElementById(id).addEventListener('change', generateSchema);
});
document.getElementById('genSchemaBtn').addEventListener('click', generateSchema);
document.getElementById('camToggleBtn').addEventListener('click', toggleCamera);
document.getElementById('captureBtn').addEventListener('click', captureAndDecode);
document.getElementById('copyLogBtn').addEventListener('click', copyLogFn);
document.getElementById('clearLogBtn').addEventListener('click', clearLogFn);

updateCapacityNote();
generateSchema();
log('Ініціалізація завершена. Готово до тесту.');
</script>
